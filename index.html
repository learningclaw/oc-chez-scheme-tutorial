ot;) (command-args cmd)))\n  \n  ;; 测试 PUT 命令\n  (let ((cmd (parse-command &quot;PUT key value&quot;)))\n    (test-equal &quot;Parse PUT command&quot; 'put (command-type cmd))\n    (test-equal &quot;Parse PUT args&quot; '(&quot;key&quot; &quot;value&quot;) (command-args cmd)))\n  \n  ;; 测试无效命令\n  (let ((cmd (parse-command &quot;INVALID&quot;)))\n    (test-equal &quot;Parse invalid command&quot; 'error (command-type cmd)))\n  \n  ;; 测试参数错误\n  (let ((cmd (parse-command &quot;GET&quot;)))\n    (test-equal &quot;Parse GET without args&quot; 'error (command-type cmd))))\n\n;; 性能测试\n(define (test-performance)\n  (printf &quot;Testing performance...~n&quot;)\n  (let ((store (make-kv-store)))\n    \n    ;; 大量插入测试\n    (printf &quot;  Inserting 10000 keys...~n&quot;)\n    (let ((start-time (current-time 'time-process)))\n      (let loop ((i 0))\n        (when (&lt; i 10000)\n          (kv-put! store (format &quot;key~a&quot; i) (format &quot;value~a&quot; i))\n          (loop (+ i 1))))\n      (let ((end-time (current-time 'time-process)))\n        (printf &quot;  Insert time: ~a seconds~n&quot; (- end-time start-time))))\n    \n    ;; 随机查找测试\n    (printf &quot;  Random lookups...~n&quot;)\n    (let ((start-time (current-time 'time-process)))\n      (let loop ((i 0))\n        (when (&lt; i 1000)\n          (kv-get store (format &quot;key~a&quot; (random 10000)))\n          (loop (+ i 1))))\n      (let ((end-time (current-time 'time-process)))\n        (printf &quot;  Lookup time: ~a seconds~n&quot; (- end-time start-time))))\n    \n    ;; 验证统计信息\n    (let ((stats (kv-stats store)))\n      (test-equal &quot;Performance - final size&quot; 10000 (cdr (assoc 'size stats)))\n      (test-true &quot;Performance - gets &gt; 0&quot; (&gt; (cdr (assoc 'gets stats)) 0)))))\n\n;; 运行所有测试\n(define (run-all-tests)\n  (printf &quot;Starting KV-Store tests...~n~n&quot;)\n  \n  (test-basic-operations)\n  (printf &quot;~n&quot;)\n  \n  (test-persistence)\n  (printf &quot;~n&quot;)\n  \n  (test-transactions)\n  (printf &quot;~n&quot;)\n  \n  (test-command-parsing)\n  (printf &quot;~n&quot;)\n  \n  (test-performance)\n  (printf &quot;~n&quot;)\n  \n  (printf &quot;Test Results:~n&quot;)\n  (printf &quot;  Passed: ~a~n&quot; *tests-passed*)\n  (printf &quot;  Failed: ~a~n&quot; *tests-failed*)\n  (printf &quot;  Total:  ~a~n&quot; (+ *tests-passed* *tests-failed*))\n  \n  (if (&gt; *tests-failed* 0)\n      (begin\n        (printf &quot;~nSome tests failed!~n&quot;)\n        (exit 1))\n      (printf &quot;~nAll tests passed!~n&quot;)))\n\n;; 运行测试\n(run-all-tests)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>第八步：使用示例</h2><h3>编译和运行</h3><pre class=\"code-display\"><code class=\"language-bash\"># 编译所有库\nscheme --compile-imported-libraries test-kv.ss\n\n# 运行测试\n./test-kv.ss\n\n# 启动 REPL 模式\n./main.ss\n\n# 启动服务器模式\n./main.ss --server --port 8080 --data mydata.db</code></pre><h3>基本使用</h3><div class=\"code-block\" id=\"code_2gp5x60j2\"><pre class=\"code-display\"><code class=\"language-scheme\">;; REPL 中的使用示例\nkv-store&gt; PUT name &quot;Alice&quot;\nOK\nkv-store&gt; PUT age &quot;25&quot;\nOK\nkv-store&gt; GET name\nAlice\nkv-store&gt; EXISTS age\ntrue\nkv-store&gt; SIZE\n2\nkv-store&gt; SAVE data.db\nSaved\nkv-store&gt; STATS\n((gets . 1) (puts . 2) (deletes . 0) (hits . 1) (misses . 0) (hit-ratio . 1) (size . 2))\n\n;; 事务示例\nkv-store&gt; BEGIN\nTransaction started\nkv-store [tx]&gt; PUT balance &quot;1000&quot;\nOK\nkv-store [tx]&gt; PUT account &quot;12345&quot;  \nOK\nkv-store [tx]&gt; ROLLBACK\nTransaction rolled back\nkv-store&gt; SIZE\n2</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_2gp5x60j2')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_2gp5x60j2')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; REPL 中的使用示例\nkv-store&gt; PUT name &quot;Alice&quot;\nOK\nkv-store&gt; PUT age &quot;25&quot;\nOK\nkv-store&gt; GET name\nAlice\nkv-store&gt; EXISTS age\ntrue\nkv-store&gt; SIZE\n2\nkv-store&gt; SAVE data.db\nSaved\nkv-store&gt; STATS\n((gets . 1) (puts . 2) (deletes . 0) (hits . 1) (misses . 0) (hit-ratio . 1) (size . 2))\n\n;; 事务示例\nkv-store&gt; BEGIN\nTransaction started\nkv-store [tx]&gt; PUT balance &quot;1000&quot;\nOK\nkv-store [tx]&gt; PUT account &quot;12345&quot;  \nOK\nkv-store [tx]&gt; ROLLBACK\nTransaction rolled back\nkv-store&gt; SIZE\n2</textarea><div class=\"code-output\" style=\"display:none\"></div></div><p>这个完整的项目展示了：</p><ul><li>模块化设计和库的使用</li><li>数据结构的选择和优化</li><li>错误处理和事务支持</li><li>I/O 操作和持久化</li><li>并发控制和线程安全</li><li>网络编程</li><li>性能监控和测试</li><li>REPL 和命令行界面</li></ul><p>通过这个项目，你应该对 Chez Scheme 的实际应用有了深入的理解！</p><hr>"},{"id":"appendix-reference","title":"附录：快速参考","html":"<h1>附录：快速参考</h1><p>本附录提供 Chez Scheme 中最常用函数和语法的快速查询表。</p><h2>数值运算</h2><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>+</code></td><td>加法</td><td><code>(+ 1 2 3)</code> → <code>6</code></td></tr><tr><td><code>-</code></td><td>减法</td><td><code>(- 10 3)</code> → <code>7</code></td></tr><tr><td><code>*</code></td><td>乘法</td><td><code>(* 2 3 4)</code> → <code>24</code></td></tr><tr><td><code>/</code></td><td>除法</td><td><code>(/ 10 3)</code> → <code>10/3</code></td></tr><tr><td><code>quotient</code></td><td>整数除法</td><td><code>(quotient 10 3)</code> → <code>3</code></td></tr><tr><td><code>remainder</code></td><td>余数</td><td><code>(remainder 10 3)</code> → <code>1</code></td></tr><tr><td><code>modulo</code></td><td>模运算</td><td><code>(modulo -10 3)</code> → <code>2</code></td></tr><tr><td><code>expt</code></td><td>幂运算</td><td><code>(expt 2 10)</code> → <code>1024</code></td></tr><tr><td><code>sqrt</code></td><td>平方根</td><td><code>(sqrt 16)</code> → <code>4</code></td></tr><tr><td><code>abs</code></td><td>绝对值</td><td><code>(abs -5)</code> → <code>5</code></td></tr><tr><td><code>max</code></td><td>最大值</td><td><code>(max 1 5 3)</code> → <code>5</code></td></tr><tr><td><code>min</code></td><td>最小值</td><td><code>(min 1 5 3)</code> → <code>1</code></td></tr><tr><td><code>floor</code></td><td>向下取整</td><td><code>(floor 3.7)</code> → <code>3.0</code></td></tr><tr><td><code>ceiling</code></td><td>向上取整</td><td><code>(ceiling 3.2)</code> → <code>4.0</code></td></tr><tr><td><code>round</code></td><td>四舍五入</td><td><code>(round 3.5)</code> → <code>4.0</code></td></tr><tr><td><code>truncate</code></td><td>截断</td><td><code>(truncate 3.7)</code> → <code>3.0</code></td></tr></table></div><h3>数值比较</h3><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>=</code></td><td>数值相等</td><td><code>(= 1 1)</code> → <code>#t</code></td></tr><tr><td><code><</code></td><td>小于</td><td><code>(< 1 2 3)</code> → <code>#t</code></td></tr><tr><td><code><=</code></td><td>小于等于</td><td><code>(<= 1 2 2)</code> → <code>#t</code></td></tr><tr><td><code>></code></td><td>大于</td><td><code>(> 3 2 1)</code> → <code>#t</code></td></tr><tr><td><code>>=</code></td><td>大于等于</td><td><code>(>= 3 2 2)</code> → <code>#t</code></td></tr><tr><td><code>zero?</code></td><td>是否为零</td><td><code>(zero? 0)</code> → <code>#t</code></td></tr><tr><td><code>positive?</code></td><td>是否为正数</td><td><code>(positive? 5)</code> → <code>#t</code></td></tr><tr><td><code>negative?</code></td><td>是否为负数</td><td><code>(negative? -3)</code> → <code>#t</code></td></tr><tr><td><code>even?</code></td><td>是否为偶数</td><td><code>(even? 4)</code> → <code>#t</code></td></tr><tr><td><code>odd?</code></td><td>是否为奇数</td><td><code>(odd? 3)</code> → <code>#t</code></td></tr></table></div><h3>数值类型</h3><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>number?</code></td><td>是否为数值</td><td><code>(number? 42)</code> → <code>#t</code></td></tr><tr><td><code>integer?</code></td><td>是否为整数</td><td><code>(integer? 3)</code> → <code>#t</code></td></tr><tr><td><code>rational?</code></td><td>是否为有理数</td><td><code>(rational? 1/3)</code> → <code>#t</code></td></tr><tr><td><code>real?</code></td><td>是否为实数</td><td><code>(real? 3.14)</code> → <code>#t</code></td></tr><tr><td><code>complex?</code></td><td>是否为复数</td><td><code>(complex? 3+4i)</code> → <code>#t</code></td></tr><tr><td><code>exact?</code></td><td>是否为精确数</td><td><code>(exact? 1/3)</code> → <code>#t</code></td></tr><tr><td><code>inexact?</code></td><td>是否为不精确数</td><td><code>(inexact? 3.14)</code> → <code>#t</code></td></tr></table></div><h2>字符串操作</h2><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>string?</code></td><td>是否为字符串</td><td><code>(string? \"hello\")</code> → <code>#t</code></td></tr><tr><td><code>string-length</code></td><td>字符串长度</td><td><code>(string-length \"hello\")</code> → <code>5</code></td></tr><tr><td><code>string-ref</code></td><td>获取字符</td><td><code>(string-ref \"hello\" 1)</code> → <code>#\\e</code></td></tr><tr><td><code>string-set!</code></td><td>设置字符</td><td><code>(string-set! str 0 #\\H)</code></td></tr><tr><td><code>string=?</code></td><td>字符串相等</td><td><code>(string=? \"a\" \"a\")</code> → <code>#t</code></td></tr><tr><td><code>string<?</code></td><td>字典序小于</td><td><code>(string<? \"a\" \"b\")</code> → <code>#t</code></td></tr><tr><td><code>string<=?</code></td><td>字典序小于等于</td><td><code>(string<=? \"a\" \"a\")</code> → <code>#t</code></td></tr><tr><td><code>string>?</code></td><td>字典序大于</td><td><code>(string>? \"b\" \"a\")</code> → <code>#t</code></td></tr><tr><td><code>string>=?</code></td><td>字典序大于等于</td><td><code>(string>=? \"b\" \"a\")</code> → <code>#t</code></td></tr><tr><td><code>string-ci=?</code></td><td>忽略大小写相等</td><td><code>(string-ci=? \"A\" \"a\")</code> → <code>#t</code></td></tr><tr><td><code>string-append</code></td><td>连接字符串</td><td><code>(string-append \"he\" \"llo\")</code> → <code>\"hello\"</code></td></tr><tr><td><code>substring</code></td><td>子字符串</td><td><code>(substring \"hello\" 1 4)</code> → <code>\"ell\"</code></td></tr><tr><td><code>string->list</code></td><td>转换为字符列表</td><td><code>(string->list \"abc\")</code> → <code>(#\\a #\\b #\\c)</code></td></tr><tr><td><code>list->string</code></td><td>从字符列表创建</td><td><code>(list->string '(#\\a #\\b))</code> → <code>\"ab\"</code></td></tr><tr><td><code>string->number</code></td><td>转换为数值</td><td><code>(string->number \"123\")</code> → <code>123</code></td></tr><tr><td><code>number->string</code></td><td>数值转换为字符串</td><td><code>(number->string 123)</code> → <code>\"123\"</code></td></tr></table></div><h3>Chez 特有字符串函数</h3><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>string-split</code></td><td>分割字符串</td><td><code>(string-split \"a,b,c\" #\\,)</code> → <code>(\"a\" \"b\" \"c\")</code></td></tr><tr><td><code>string-trim</code></td><td>去除空白</td><td><code>(string-trim \" hello \")</code> → <code>\"hello\"</code></td></tr><tr><td><code>string-downcase</code></td><td>转换为小写</td><td><code>(string-downcase \"HELLO\")</code> → <code>\"hello\"</code></td></tr><tr><td><code>string-upcase</code></td><td>转换为大写</td><td><code>(string-upcase \"hello\")</code> → <code>\"HELLO\"</code></td></tr><tr><td><code>string-titlecase</code></td><td>转换为标题格式</td><td><code>(string-titlecase \"hello world\")</code> → <code>\"Hello World\"</code></td></tr></table></div><h2>列表操作</h2><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>null?</code></td><td>是否为空列表</td><td><code>(null? '())</code> → <code>#t</code></td></tr><tr><td><code>pair?</code></td><td>是否为对</td><td><code>(pair? '(1 . 2))</code> → <code>#t</code></td></tr><tr><td><code>list?</code></td><td>是否为列表</td><td><code>(list? '(1 2 3))</code> → <code>#t</code></td></tr><tr><td><code>cons</code></td><td>构造对</td><td><code>(cons 1 2)</code> → <code>(1 . 2)</code></td></tr><tr><td><code>car</code></td><td>第一个元素</td><td><code>(car '(1 2 3))</code> → <code>1</code></td></tr><tr><td><code>cdr</code></td><td>除第一个外的其余</td><td><code>(cdr '(1 2 3))</code> → <code>(2 3)</code></td></tr><tr><td><code>list</code></td><td>创建列表</td><td><code>(list 1 2 3)</code> → <code>(1 2 3)</code></td></tr><tr><td><code>length</code></td><td>列表长度</td><td><code>(length '(1 2 3))</code> → <code>3</code></td></tr><tr><td><code>append</code></td><td>连接列表</td><td><code>(append '(1 2) '(3 4))</code> → <code>(1 2 3 4)</code></td></tr><tr><td><code>reverse</code></td><td>反转列表</td><td><code>(reverse '(1 2 3))</code> → <code>(3 2 1)</code></td></tr><tr><td><code>list-ref</code></td><td>获取元素</td><td><code>(list-ref '(a b c) 1)</code> → <code>b</code></td></tr><tr><td><code>list-tail</code></td><td>获取尾部</td><td><code>(list-tail '(a b c) 1)</code> → <code>(b c)</code></td></tr><tr><td><code>member</code></td><td>查找元素</td><td><code>(member 2 '(1 2 3))</code> → <code>(2 3)</code></td></tr><tr><td><code>assoc</code></td><td>关联列表查找</td><td><code>(assoc 'b '((a 1) (b 2)))</code> → <code>(b 2)</code></td></tr></table></div><h3>列表组合器</h3><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>map</code></td><td>映射</td><td><code>(map + '(1 2) '(3 4))</code> → <code>(4 6)</code></td></tr><tr><td><code>for-each</code></td><td>遍历（副作用）</td><td><code>(for-each display '(1 2 3))</code></td></tr><tr><td><code>filter</code></td><td>过滤</td><td><code>(filter even? '(1 2 3 4))</code> → <code>(2 4)</code></td></tr><tr><td><code>fold-left</code></td><td>左折叠</td><td><code>(fold-left + 0 '(1 2 3))</code> → <code>6</code></td></tr><tr><td><code>fold-right</code></td><td>右折叠</td><td><code>(fold-right cons '() '(1 2 3))</code> → <code>(1 2 3)</code></td></tr><tr><td><code>every</code></td><td>全部满足</td><td><code>(every even? '(2 4 6))</code> → <code>#t</code></td></tr><tr><td><code>exists</code></td><td>存在满足</td><td><code>(exists even? '(1 2 3))</code> → <code>#t</code></td></tr><tr><td><code>find</code></td><td>查找第一个</td><td><code>(find even? '(1 2 3))</code> → <code>2</code></td></tr></table></div><h3>列表修改</h3><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>set-car!</code></td><td>修改第一个元素</td><td><code>(set-car! pair 'new)</code></td></tr><tr><td><code>set-cdr!</code></td><td>修改其余部分</td><td><code>(set-cdr! pair 'new)</code></td></tr></table></div><h2>向量操作</h2><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>vector?</code></td><td>是否为向量</td><td><code>(vector? #(1 2 3))</code> → <code>#t</code></td></tr><tr><td><code>vector</code></td><td>创建向量</td><td><code>(vector 1 2 3)</code> → <code>#(1 2 3)</code></td></tr><tr><td><code>make-vector</code></td><td>创建指定长度向量</td><td><code>(make-vector 3 'x)</code> → <code>#(x x x)</code></td></tr><tr><td><code>vector-length</code></td><td>向量长度</td><td><code>(vector-length #(1 2 3))</code> → <code>3</code></td></tr><tr><td><code>vector-ref</code></td><td>获取元素</td><td><code>(vector-ref #(a b c) 1)</code> → <code>b</code></td></tr><tr><td><code>vector-set!</code></td><td>设置元素</td><td><code>(vector-set! vec 0 'new)</code></td></tr><tr><td><code>vector->list</code></td><td>转换为列表</td><td><code>(vector->list #(1 2 3))</code> → <code>(1 2 3)</code></td></tr><tr><td><code>list->vector</code></td><td>从列表创建</td><td><code>(list->vector '(1 2 3))</code> → <code>#(1 2 3)</code></td></tr><tr><td><code>vector-fill!</code></td><td>填充向量</td><td><code>(vector-fill! vec 'x)</code></td></tr><tr><td><code>vector-map</code></td><td>向量映射</td><td><code>(vector-map + #(1 2) #(3 4))</code> → <code>#(4 6)</code></td></tr><tr><td><code>vector-for-each</code></td><td>向量遍历</td><td><code>(vector-for-each display #(1 2 3))</code></td></tr></table></div><h2>哈希表操作 (Chez 特有)</h2><div class=\"table-wrap\"><table><tr><th>函数</th><th>用途</th><th>示例</th></tr><tr><td><code>make-hashtable</code></td><td>创建哈希表</td><td><code>(make-hashtable equal-hash equal?)</code></td></tr><tr><td><code>hashtable?</code></td><td>是否为哈希表</td><td><code>(hashtable? ht)</code> → <code>#t</code></td></tr><tr><td><code>hashtable-ref</code></td><td>获取值</td><td><code>(hashtable-ref ht key default)</code></td></tr><tr   currentChapter = idx;
  var ch = chapters[idx];
  document.querySelectorAll('.sidebar a').forEach(function(a){
    a.classList.toggle('active', a.dataset.ch === ch.id);
  });
  renderPages(ch.html, ch.title, idx);
  try { localStorage.setItem('chez-chapter', ch.id); } catch(e) {}
}

function renderPages(html, title, chapterIdx) {
  var container = document.getElementById('pages-container');
  var temp = document.createElement('div');
  temp.innerHTML = html;

  var pages = [];
  var currentGroup = [];
  var pCount = 0;

  function flushGroup() {
    if (currentGroup.length > 0) {
      pages.push(currentGroup.slice());
      currentGroup = [];
      pCount = 0;
    }
  }

  var children = Array.from(temp.childNodes);

  // New splitting logic: group by H2 sections (one knowledge point per page)
  // H1 = title page alone
  // H2 = start a new section page, collect everything until next H2 or end
  // Within a section: group heading + explanations + code as one unit

  for (var i = 0; i < children.length; i++) {
    var node = children[i];
    if (node.nodeType === 3 && !node.textContent.trim()) continue;
    var tagName = node.tagName ? node.tagName.toUpperCase() : '';

    if (tagName === 'HR') { flushGroup(); continue; }

    if (tagName === 'H1') {
      flushGroup();
      // H1 gets its own title page
      pages.push([node.cloneNode(true)]);
      continue;
    }

    if (tagName === 'H2') {
      // Start new section: flush previous, then collect H2 + everything until next H2/H1
      flushGroup();
      currentGroup.push(node.cloneNode(true));
      pCount = 0;
      // Gather content until next H2, H1, or HR
      while (i + 1 < children.length) {
        var peek = children[i + 1];
        if (!peek.tagName) { i++; currentGroup.push(peek.cloneNode(true)); continue; }
        var peekTag = peek.tagName.toUpperCase();
        if (peekTag === 'H1' || peekTag === 'H2' || peekTag === 'HR') break;
        // Only flush at H3 if page is already very full (8+ elements)
        if (peekTag === 'H3' && pCount >= 8) {
          flushGroup();
        }
        i++;
        currentGroup.push(peek.cloneNode(true));
        pCount++;
        // Flush after a code block + some content following it, to keep pages manageable
        var isCodeBlock = peek.classList && (peek.classList.contains('code-block') || peek.classList.contains('table-wrap'));
        var isExercise = peek.classList && peek.classList.contains('exercise');
        if (isCodeBlock && pCount >= 10) { flushGroup(); }
        if (isExercise && pCount >= 8) { flushGroup(); }
        if (pCount >= 12) { flushGroup(); }
      }
      flushGroup();
      continue;
    }

    // Anything outside H2 sections: just accumulate
    currentGroup.push(node.cloneNode(true));
    pCount++;
    if (pCount >= 6) flushGroup();
  }
  flushGroup();

  // Nav page
  var navDiv = document.createElement('div');
  navDiv.style.cssText = 'display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;';
  if (chapterIdx > 0) {
    var btn = document.createElement('a');
    btn.href = '#'; btn.textContent = '\u2190 ' + chapters[chapterIdx-1].title;
    btn.style.cssText = 'padding:0.6rem 1rem;background:var(--bg2);color:var(--accent);border:1px solid var(--bg3);border-radius:6px;text-decoration:none;font-size:0.88rem;';
    btn.onclick = function(e){ e.preventDefault(); showChapter(chapterIdx-1); };
    navDiv.appendChild(btn);
  }
  if (chapterIdx < chapters.length - 1) {
    var btn = document.createElement('a');
    btn.href = '#'; btn.textContent = chapters[chapterIdx+1].title + ' \u2192';
    btn.style.cssText = 'padding:0.6rem 1rem;background:var(--bg2);color:var(--accent);border:1px solid var(--bg3);border-radius:6px;text-decoration:none;font-size:0.88rem;margin-left:auto;';
    btn.onclick = function(e){ e.preventDefault(); showChapter(chapterIdx+1); };
    navDiv.appendChild(btn);
  }
  pages.push([navDiv]);

  container.innerHTML = '';
  totalPages = pages.length;

  for (var p = 0; p < pages.length; p++) {
    var pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    for (var n = 0; n < pages[p].length; n++) {
      pageDiv.appendChild(pages[p][n]);
    }
    container.appendChild(pageDiv);
  }

  container.scrollLeft = 0;
  currentPage = 0;
  updatePageIndicator();
  highlightAll();
  wireCodeBlocks();
}

function updatePageIndicator() {
  document.getElementById('page-indicator').textContent = (currentPage + 1) + ' / ' + totalPages;
}

var pagesContainer = null;
var scrollTimer = null;

function onPagesScroll() {
  if (scrollTimer) clearTimeout(scrollTimer);
  scrollTimer = setTimeout(function() {
    if (!pagesContainer) return;
    var w = pagesContainer.clientWidth;
    if (w === 0) return;
    var newPage = Math.round(pagesContainer.scrollLeft / w);
    if (newPage !== currentPage) {
      currentPage = newPage;
      updatePageIndicator();
    }
  }, 50);
}

function goToPage(idx) {
  if (!pagesContainer) return;
  if (idx < 0 || idx >= totalPages) return;
  pagesContainer.scrollTo({ left: idx * pagesContainer.clientWidth, behavior: 'smooth' });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

var replOpen = false;
function toggleRepl() {
  replOpen = !replOpen;
  document.getElementById('repl-sheet').classList.toggle('open', replOpen);
  if (replOpen) document.getElementById('repl-input').focus();
}

function highlightScheme(code) {
  var s = code;
  s = s.replace(/(;[^\n]*)/g, '<span class="cm">$1</span>');
  s = s.replace(/(&quot;(?:[^&]|&(?!quot;))*?&quot;)/g, '<span class="str">$1</span>');
  s = s.replace(/\b(#t|#f)\b/g, '<span class="bool">$1</span>');
  s = s.replace(/(?<=[(\s])(-?\d+(?:\.\d+)?(?:\/\d+)?)/g, '<span class="num">$1</span>');
  var kws = ['define','define-syntax','define-record-type','lambda','let','let\\*','letrec','if','cond','case','when','unless','begin','and','or','not','set!','do','syntax-rules','syntax-case','quote','quasiquote','unquote','import','export','library','else','=>'];
  var kwRe = new RegExp('(?<=\\()('+kws.join('|')+')(?=\\s|\\))', 'g');
  s = s.replace(kwRe, '<span class="kw">$1</span>');
  return s;
}

function highlightAll() {
  document.querySelectorAll('code.language-scheme').forEach(function(el){
    el.innerHTML = highlightScheme(el.innerHTML);
  });
}

var biwa;
try { biwa = new BiwaScheme.Interpreter(function(){}); } catch(e) {}

function runScheme(code) {
  var output = '';
  var oldPuts = BiwaScheme.Port.current_output.put_string;
  BiwaScheme.Port.current_output.put_string = function(s) { output += s; };
  try {
    var result = biwa.evaluate(code);
    if (result !== undefined && result !== BiwaScheme.undef) {
      output += (output ? '\n' : '') + BiwaScheme.to_write(result);
    }
  } catch(e) {
    output += '\u9519\u8bef: ' + (e.message || e);
    BiwaScheme.Port.current_output.put_string = oldPuts;
    return { output: output, error: true };
  }
  BiwaScheme.Port.current_output.put_string = oldPuts;
  return { output: output || '(\u65e0\u8f93\u51fa)', error: false };
}

function wireCodeBlocks() {
  document.querySelectorAll('.code-block').forEach(function(block) {
    var editBtn = block.querySelector('.btn-edit');
    var runBtn = block.querySelector('.btn-run');
    var editor = block.querySelector('.code-editor');
    var display = block.querySelector('.code-display');
    var outputDiv = block.querySelector('.code-output');

    if (editBtn) {
      editBtn.onclick = function() {
        if (!editor) return;
        if (editor.style.display === 'none') {
          editor.style.display = 'block';
          if (display) display.style.display = 'none';
          editor.focus();
        } else {
          editor.style.display = 'none';
          if (display) display.style.display = 'block';
        }
      };
    }
    if (runBtn) {
      runBtn.onclick = function() {
        var code = (editor && editor.style.display !== 'none') ? editor.value : (block.querySelector('code') ? block.querySelector('code').textContent : '');
        var result = runScheme(code);
        if (outputDiv) {
          outputDiv.textContent = result.output;
          outputDiv.className = 'code-output' + (result.error ? ' error' : '');
          outputDiv.style.display = 'block';
        }
      };
    }
  });
}

var replHistory = [];
var replHistIdx = -1;

function replEval() {
  var input = document.getElementById('repl-input');
  var output = document.getElementById('repl-output');
  var code = input.value.trim();
  if (!code) return;
  replHistory.unshift(code);
  replHistIdx = -1;
  output.textContent += '> ' + code + '\n';
  var result = runScheme(code);
  output.textContent += result.output + '\n';
  output.scrollTop = output.scrollHeight;
  input.value = '';
}

function clearRepl() {
  document.getElementById('repl-output').textContent = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Tab' && e.target.classList.contains('code-editor')) {
    e.preventDefault();
    var s = e.target.selectionStart;
    e.target.value = e.target.value.substring(0,s) + '  ' + e.target.value.substring(e.target.selectionEnd);
    e.target.selectionStart = e.target.selectionEnd = s + 2;
  }
});

document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('repl-input');
  input.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowUp') { e.preventDefault(); if (replHistIdx < replHistory.length-1) { replHistIdx++; input.value = replHistory[replHistIdx]; } }
    if (e.key === 'ArrowDown') { e.preventDefault(); if (replHistIdx > 0) { replHistIdx--; input.value = replHistory[replHistIdx]; } else { replHistIdx = -1; input.value = ''; } }
  });

  pagesContainer = document.getElementById('pages-container');
  pagesContainer.addEventListener('scroll', onPagesScroll);

  document.getElementById('tap-left').addEventListener('click', function(){ goToPage(currentPage - 1); });
  document.getElementById('tap-right').addEventListener('click', function(){ goToPage(currentPage + 1); });

  var saved;
  try { saved = localStorage.getItem('chez-chapter'); } catch(e) {}
  if (saved) {
    var idx = chapters.findIndex(function(c){ return c.id === saved; });
    if (idx >= 0) { showChapter(idx); return; }
  }
  showChapter(0);
});

</script>
</body>
</html>
