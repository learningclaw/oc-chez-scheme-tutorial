ask-queue*))\n            (next-task))))))\n\n(define (resume)\n  (if *current-continuation*\n      (let ((cont *current-continuation*))\n        (set! *current-continuation* #f)\n        (cont 'resumed))\n      'no-task-to-resume))\n\n;; 示例：两个协程\n(define (task1)\n  (printf &quot;Task 1: Step 1~n&quot;)\n  (yield)\n  (printf &quot;Task 1: Step 2~n&quot;)\n  (yield)\n  (printf &quot;Task 1: Done~n&quot;))\n\n(define (task2)\n  (printf &quot;Task 2: Step 1~n&quot;)\n  (yield)\n  (printf &quot;Task 2: Step 2~n&quot;)\n  (yield)\n  (printf &quot;Task 2: Done~n&quot;))\n\n;; 运行协程\n(spawn task1)\n(spawn task2)\n(yield)  ; 启动第一个任务\n(resume) ; 恢复并继续\n(resume)\n(resume)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_41r0mk7ls')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_41r0mk7ls')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 简单的协程系统\n(define *current-continuation* #f)\n(define *task-queue* '())\n\n(define (spawn thunk)\n  (set! *task-queue* (append *task-queue* (list thunk))))\n\n(define (yield)\n  (call/cc\n    (lambda (current-task)\n      (set! *current-continuation* current-task)\n      (if (null? *task-queue*)\n          'no-more-tasks\n          (let ((next-task (car *task-queue*)))\n            (set! *task-queue* (cdr *task-queue*))\n            (next-task))))))\n\n(define (resume)\n  (if *current-continuation*\n      (let ((cont *current-continuation*))\n        (set! *current-continuation* #f)\n        (cont 'resumed))\n      'no-task-to-resume))\n\n;; 示例：两个协程\n(define (task1)\n  (printf &quot;Task 1: Step 1~n&quot;)\n  (yield)\n  (printf &quot;Task 1: Step 2~n&quot;)\n  (yield)\n  (printf &quot;Task 1: Done~n&quot;))\n\n(define (task2)\n  (printf &quot;Task 2: Step 1~n&quot;)\n  (yield)\n  (printf &quot;Task 2: Step 2~n&quot;)\n  (yield)\n  (printf &quot;Task 2: Done~n&quot;))\n\n;; 运行协程\n(spawn task1)\n(spawn task2)\n(yield)  ; 启动第一个任务\n(resume) ; 恢复并继续\n(resume)\n(resume)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>生成器</h2><p>使用继续符实现生成器：</p><div class=\"code-block\" id=\"code_d40k8k6lg\"><pre class=\"code-display\"><code class=\"language-scheme\">(define (make-generator proc)\n  (let ((return #f)\n        (resume #f)\n        (finished? #f))\n    (define (yield value)\n      (call/cc\n        (lambda (cont)\n          (set! resume cont)\n          (return value))))\n    \n    (lambda ()\n      (if finished?\n          'generator-finished\n          (call/cc\n            (lambda (cont)\n              (set! return cont)\n              (if resume\n                  (resume 'resume)\n                  (begin\n                    (proc yield)\n                    (set! finished? #t)\n                    'generator-finished))))))))\n\n;; 数字生成器\n(define numbers-gen\n  (make-generator\n    (lambda (yield)\n      (let loop ((n 0))\n        (yield n)\n        (loop (+ n 1))))))\n\n(numbers-gen)               ; → 0\n(numbers-gen)               ; → 1\n(numbers-gen)               ; → 2\n\n;; 斐波那契生成器\n(define fib-gen\n  (make-generator\n    (lambda (yield)\n      (let loop ((a 0) (b 1))\n        (yield a)\n        (loop b (+ a b))))))\n\n(fib-gen)                   ; → 0\n(fib-gen)                   ; → 1\n(fib-gen)                   ; → 1\n(fib-gen)                   ; → 2\n(fib-gen)                   ; → 3\n(fib-gen)                   ; → 5</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_d40k8k6lg')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_d40k8k6lg')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">(define (make-generator proc)\n  (let ((return #f)\n        (resume #f)\n        (finished? #f))\n    (define (yield value)\n      (call/cc\n        (lambda (cont)\n          (set! resume cont)\n          (return value))))\n    \n    (lambda ()\n      (if finished?\n          'generator-finished\n          (call/cc\n            (lambda (cont)\n              (set! return cont)\n              (if resume\n                  (resume 'resume)\n                  (begin\n                    (proc yield)\n                    (set! finished? #t)\n                    'generator-finished))))))))\n\n;; 数字生成器\n(define numbers-gen\n  (make-generator\n    (lambda (yield)\n      (let loop ((n 0))\n        (yield n)\n        (loop (+ n 1))))))\n\n(numbers-gen)               ; → 0\n(numbers-gen)               ; → 1\n(numbers-gen)               ; → 2\n\n;; 斐波那契生成器\n(define fib-gen\n  (make-generator\n    (lambda (yield)\n      (let loop ((a 0) (b 1))\n        (yield a)\n        (loop b (+ a b))))))\n\n(fib-gen)                   ; → 0\n(fib-gen)                   ; → 1\n(fib-gen)                   ; → 1\n(fib-gen)                   ; → 2\n(fib-gen)                   ; → 3\n(fib-gen)                   ; → 5</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>异步编程风格</h2><p>继续符可以实现异步编程模式：</p><div class=\"code-block\" id=\"code_myx3ib4h8\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 模拟异步操作\n(define (async-operation value callback)\n  ;; 在真实环境中，这可能是网络请求或文件读取\n  (callback value))\n\n;; 使用回调的异步风格\n(define (async-with-callbacks)\n  (async-operation 1\n    (lambda (result1)\n      (printf &quot;Got result1: ~d~n&quot; result1)\n      (async-operation (* result1 2)\n        (lambda (result2)\n          (printf &quot;Got result2: ~d~n&quot; result2)\n          (async-operation (+ result2 1)\n            (lambda (result3)\n              (printf &quot;Final result: ~d~n&quot; result3))))))))\n\n;; 使用继续符的同步风格写法\n(define (wait-for async-op value)\n  (call/cc\n    (lambda (resume)\n      (async-op value resume))))\n\n(define (async-with-continuations)\n  (let ((result1 (wait-for async-operation 1)))\n    (printf &quot;Got result1: ~d~n&quot; result1)\n    (let ((result2 (wait-for async-operation (* result1 2))))\n      (printf &quot;Got result2: ~d~n&quot; result2)\n      (let ((result3 (wait-for async-operation (+ result2 1))))\n        (printf &quot;Final result: ~d~n&quot; result3)))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_myx3ib4h8')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_myx3ib4h8')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 模拟异步操作\n(define (async-operation value callback)\n  ;; 在真实环境中，这可能是网络请求或文件读取\n  (callback value))\n\n;; 使用回调的异步风格\n(define (async-with-callbacks)\n  (async-operation 1\n    (lambda (result1)\n      (printf &quot;Got result1: ~d~n&quot; result1)\n      (async-operation (* result1 2)\n        (lambda (result2)\n          (printf &quot;Got result2: ~d~n&quot; result2)\n          (async-operation (+ result2 1)\n            (lambda (result3)\n              (printf &quot;Final result: ~d~n&quot; result3))))))))\n\n;; 使用继续符的同步风格写法\n(define (wait-for async-op value)\n  (call/cc\n    (lambda (resume)\n      (async-op value resume))))\n\n(define (async-with-continuations)\n  (let ((result1 (wait-for async-operation 1)))\n    (printf &quot;Got result1: ~d~n&quot; result1)\n    (let ((result2 (wait-for async-operation (* result1 2))))\n      (printf &quot;Got result2: ~d~n&quot; result2)\n      (let ((result3 (wait-for async-operation (+ result2 1))))\n        (printf &quot;Final result: ~d~n&quot; result3)))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>回溯搜索</h2><p>继续符可以实现回溯算法：</p><div class=\"code-block\" id=\"code_q4mpehrlk\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 选择点和失败继续符\n(define *choices* '())\n(define *fail* #f)\n\n(define (choose lst)\n  (if (null? lst)\n      (fail)\n      (call/cc\n        (lambda (k)\n          (set! *choices* \n                (cons (lambda () \n                        (k (choose (cdr lst))))\n                      *choices*))\n          (car lst)))))\n\n(define (fail)\n  (if (null? *choices*)\n      'no-solution\n      (let ((choice (car *choices*)))\n        (set! *choices* (cdr *choices*))\n        (choice))))\n\n(define (require condition)\n  (unless condition (fail)))\n\n;; N 皇后问题的简化版本（4x4 棋盘）\n(define (queens-4x4)\n  (let ((positions '()))\n    (let row-loop ((row 0))\n      (if (= row 4)\n          positions\n          (let ((col (choose '(0 1 2 3))))\n            (require (not (member col (map car positions))))  ; 不同列\n            ;; 简化：只检查列冲突\n            (set! positions (cons (list row col) positions))\n            (row-loop (+ row 1)))))))\n\n;; 查找第一个解\n(define solution (queens-4x4))\n(if (eq? solution 'no-solution)\n    (printf &quot;No solution found~n&quot;)\n    (printf &quot;Solution: ~a~n&quot; solution))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_q4mpehrlk')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_q4mpehrlk')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 选择点和失败继续符\n(define *choices* '())\n(define *fail* #f)\n\n(define (choose lst)\n  (if (null? lst)\n      (fail)\n      (call/cc\n        (lambda (k)\n          (set! *choices* \n                (cons (lambda () \n                        (k (choose (cdr lst))))\n                      *choices*))\n          (car lst)))))\n\n(define (fail)\n  (if (null? *choices*)\n      'no-solution\n      (let ((choice (car *choices*)))\n        (set! *choices* (cdr *choices*))\n        (choice))))\n\n(define (require condition)\n  (unless condition (fail)))\n\n;; N 皇后问题的简化版本（4x4 棋盘）\n(define (queens-4x4)\n  (let ((positions '()))\n    (let row-loop ((row 0))\n      (if (= row 4)\n          positions\n          (let ((col (choose '(0 1 2 3))))\n            (require (not (member col (map car positions))))  ; 不同列\n            ;; 简化：只检查列冲突\n            (set! positions (cons (list row col) positions))\n            (row-loop (+ row 1)))))))\n\n;; 查找第一个解\n(define solution (queens-4x4))\n(if (eq? solution 'no-solution)\n    (printf &quot;No solution found~n&quot;)\n    (printf &quot;Solution: ~a~n&quot; solution))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>继续符与性能</h2><div class=\"code-block\" id=\"code_xwc6zk7vq\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 继续符比异常更快的早期返回\n(define (fast-find predicate lst)\n  (call/cc\n    (lambda (return)\n      (let loop ((items lst))\n        (cond\n          ((null? items) #f)\n          ((predicate (car items)) (return (car items)))\n          (else (loop (cdr items))))))))\n\n;; 与普通递归的对比\n(define (normal-find predicate lst)\n  (cond\n    ((null? lst) #f)\n    ((predicate (car lst)) (car lst))\n    (else (normal-find predicate (cdr lst)))))\n\n;; 性能测试\n(define big-list (iota 100000))\n\n(time (fast-find (lambda (x) (= x 50000)) big-list))\n(time (normal-find (lambda (x) (= x 50000)) big-list))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_xwc6zk7vq')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_xwc6zk7vq')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 继续符比异常更快的早期返回\n(define (fast-find predicate lst)\n  (call/cc\n    (lambda (return)\n      (let loop ((items lst))\n        (cond\n          ((null? items) #f)\n          ((predicate (car items)) (return (car items)))\n          (else (loop (cdr items))))))))\n\n;; 与普通递归的对比\n(define (normal-find predicate lst)\n  (cond\n    ((null? lst) #f)\n    ((predicate (car lst)) (car lst))\n    (else (normal-find predicate (cdr lst)))))\n\n;; 性能测试\n(define big-list (iota 100000))\n\n(time (fast-find (lambda (x) (= x 50000)) big-list))\n(time (normal-find (lambda (x) (= x 50000)) big-list))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>练习</h2><h3>练习1：简单异常系统</h3><p>实现一个简单的异常处理系统，支持 throw、catch 和 finally。</p><h3>练习2：状态机回溯</h3><p>使用继续符实现可以回溯的状态机。</p><h3>练习3：树遍历生成器</h3><p>实现一个可以逐个返回树节点的生成器。</p><h3>练习4：协作式调度器</h3><p>实现一个简单的协作式任务调度器，支持任务优先级。</p><h3>练习5：amb 操作符</h3><p>实现 amb（ambiguous）操作符，用于非确定性计算。</p><h2>参考答案</h2><div class=\"code-block\" id=\"code_iosele96p\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 练习1：简单异常系统\n(define *exception-stack* '())\n\n(define (throw exception-type data)\n  (if (null? *exception-stack*)\n      (error &quot;Uncaught exception&quot; exception-type data)\n      (let ((handler (car *exception-stack*)))\n        (set! *exception-stack* (cdr *exception-stack*))\n        (handler exception-type data))))\n\n(define-syntax try\n  (syntax-rules (catch finally)\n    ((try body (catch (type var) handler) (finally cleanup))\n     (let ((old-stack *exception-stack*))\n       (call/cc\n         (lambda (normal-exit)\n           (set! *exception-stack*\n                 (cons (lambda (exc-type exc-data)\n                         (set! *exception-stack* old-stack)\n                         (if (eq? exc-type 'type)\n                             (let ((var exc-data))\n                               (let ((result handler))\n                                 cleanup\n                                 (normal-exit result)))\n                             (begin\n                               cleanup\n                               (throw exc-type exc-data))))\n                       *exception-stack*))\n           (let ((result body))\n             (set! *exception-stack* old-stack)\n             cleanup\n             result)))))))\n\n;; 练习2：状态机回溯\n(define (make-backtrack-state-machine initial-state)\n  (let ((state initial-state)\n        (history '()))\n    (lambda (operation . args)\n      (case operation\n        ((current-state) state)\n        ((transition)\n         (let ((new-state (car args)))\n           (set! history (cons state history))\n           (set! state new-state)))\n        ((backtrack)\n         (if (null? history)\n             'no-history\n             (begin\n               (set! state (car history))\n               (set! history (cdr history))\n               state)))\n        ((reset)\n         (set! state initial-state)\n         (set! history '()))))))\n\n;; 练习3：树遍历生成器\n(define-record-type tree-node\n  (make-tree-node value left right)\n  tree-node?\n  (value tree-node-value)\n  (left tree-node-left)\n  (right tree-node-right))\n\n(define (make-tree-generator tree)\n  (let ((return #f)\n        (resume #f)\n        (finished? #f))\n    \n    (define (yield value)\n      (call/cc\n        (lambda (cont)\n          (set! resume cont)\n          (return value))))\n    \n    (define (traverse node)\n      (when node\n        (yield (tree-node-value node))\n        (traverse (tree-node-left node))\n        (traverse (tree-node-right node))))\n    \n    (lambda ()\n      (if finished?\n          'tree-finished\n          (call/cc\n            (lambda (cont)\n              (set! return cont)\n              (if resume\n                  (resume 'continue)\n                  (begin\n                    (traverse tree)\n                    (set! finished? #t)\n                    'tree-finished))))))))\n\n;; 练习4：协作式调度器\n(define (make-scheduler)\n  (let ((tasks '()))\n    \n    (define (add-task priority thunk)\n      (set! tasks \n            (cons (cons priority thunk) \n                  (remove (lambda (task) (&gt;= (car task) priority)) tasks))))\n    \n    (define (run-scheduler)\n      (unless (null? tasks)\n        (let ((next-task (car tasks)))\n          (set! tasks (cdr tasks))\n          ((cdr next-task))\n          (run-scheduler))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add) (add-task (car args) (cadr args)))\n        ((run) (run-scheduler))\n        ((empty?) (null? tasks))))))\n\n;; 练习5：amb 操作符\n(define *amb-fail* #f)\n\n(define (initialize-amb)\n  (call/cc\n    (lambda (exit)\n      (set! *amb-fail* (lambda () (exit 'amb-tree-exhausted))))))\n\n(define (amb . choices)\n  (let ((fail-save *amb-fail*))\n    (call/cc\n      (lambda (k)\n        (let try-next ((choices-left choices))\n          (if (null? choices-left)\n              (fail-save)\n              (call/cc\n                (lambda (try-again)\n                  (set! *amb-fail*\n                        (lambda () (try-again 'failed)))\n                  (k (car choices-left))))))))))\n\n(define (require condition)\n  (unless condition (*amb-fail*)))\n\n;; 使用 amb\n(define (solve-puzzle)\n  (initialize-amb)\n  (let ((a (amb 1 2 3))\n        (b (amb 4 5 6)))\n    (require (= (+ a b) 7))\n    (list a b)))\n\n; (solve-puzzle)  ; → (1 6) 或 (2 5) 或 (3 4)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_iosele96p')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_iosele96p')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 练习1：简单异常系统\n(define *exception-stack* '())\n\n(define (throw exception-type data)\n  (if (null? *exception-stack*)\n      (error &quot;Uncaught exception&quot; exception-type data)\n      (let ((handler (car *exception-stack*)))\n        (set! *exception-stack* (cdr *exception-stack*))\n        (handler exception-type data))))\n\n(define-syntax try\n  (syntax-rules (catch finally)\n    ((try body (catch (type var) handler) (finally cleanup))\n     (let ((old-stack *exception-stack*))\n       (call/cc\n         (lambda (normal-exit)\n           (set! *exception-stack*\n                 (cons (lambda (exc-type exc-data)\n                         (set! *exception-stack* old-stack)\n                         (if (eq? exc-type 'type)\n                             (let ((var exc-data))\n                               (let ((result handler))\n                                 cleanup\n                                 (normal-exit result)))\n                             (begin\n                               cleanup\n                               (throw exc-type exc-data))))\n                       *exception-stack*))\n           (let ((result body))\n             (set! *exception-stack* old-stack)\n             cleanup\n             result)))))))\n\n;; 练习2：状态机回溯\n(define (make-backtrack-state-machine initial-state)\n  (let ((state initial-state)\n        (history '()))\n    (lambda (operation . args)\n      (case operation\n        ((current-state) state)\n        ((transition)\n         (let ((new-state (car args)))\n           (set! history (cons state history))\n           (set! state new-state)))\n        ((backtrack)\n         (if (null? history)\n             'no-history\n             (begin\n               (set! state (car history))\n               (set! history (cdr history))\n               state)))\n        ((reset)\n         (set! state initial-state)\n         (set! history '()))))))\n\n;; 练习3：树遍历生成器\n(define-record-type tree-node\n  (make-tree-node value left right)\n  tree-node?\n  (value tree-node-value)\n  (left tree-node-left)\n  (right tree-node-right))\n\n(define (make-tree-generator tree)\n  (let ((return #f)\n        (resume #f)\n        (finished? #f))\n    \n    (define (yield value)\n      (call/cc\n        (lambda (cont)\n          (set! resume cont)\n          (return value))))\n    \n    (define (traverse node)\n      (when node\n        (yield (tree-node-value node))\n        (traverse (tree-node-left node))\n        (traverse (tree-node-right node))))\n    \n    (lambda ()\n      (if finished?\n          'tree-finished\n          (call/cc\n            (lambda (cont)\n              (set! return cont)\n              (if resume\n                  (resume 'continue)\n                  (begin\n                    (traverse tree)\n                    (set! finished? #t)\n                    'tree-finished))))))))\n\n;; 练习4：协作式调度器\n(define (make-scheduler)\n  (let ((tasks '()))\n    \n    (define (add-task priority thunk)\n      (set! tasks \n            (cons (cons priority thunk) \n                  (remove (lambda (task) (&gt;= (car task) priority)) tasks))))\n    \n    (define (run-scheduler)\n      (unless (null? tasks)\n        (let ((next-task (car tasks)))\n          (set! tasks (cdr tasks))\n          ((cdr next-task))\n          (run-scheduler))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add) (add-task (car args) (cadr args)))\n        ((run) (run-scheduler))\n        ((empty?) (null? tasks))))))\n\n;; 练习5：amb 操作符\n(define *amb-fail* #f)\n\n(define (initialize-amb)\n  (call/cc\n    (lambda (exit)\n      (set! *amb-fail* (lambda () (exit 'amb-tree-exhausted))))))\n\n(define (amb . choices)\n  (let ((fail-save *amb-fail*))\n    (call/cc\n      (lambda (k)\n        (let try-next ((choices-left choices))\n          (if (null? choices-left)\n              (fail-save)\n              (call/cc\n                (lambda (try-again)\n                  (set! *amb-fail*\n                        (lambda () (try-again 'failed)))\n                  (k (car choices-left))))))))))\n\n(define (require condition)\n  (unless condition (*amb-fail*)))\n\n;; 使用 amb\n(define (solve-puzzle)\n  (initialize-amb)\n  (let ((a (amb 1 2 3))\n        (b (amb 4 5 6)))\n    (require (= (+ a b) 7))\n    (list a b)))\n\n; (solve-puzzle)  ; → (1 6) 或 (2 5) 或 (3 4)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><hr>"},{"id":"14-modules","title":"第 14 章：模块系统","html":"<h1>第 14 章：模块系统</h1><p>模块系统让你可以组织代码、管理命名空间、控制导入导出，是构建大型程序的关键。</p><h2>库的基本概念</h2><p>在 Scheme 中，模块被称为\"库\"(libraries)。每个库：</p><ul><li>有唯一的名称</li><li>明确声明导出的标识符</li><li>明确声明依赖的其他库</li><li>可以有版本号</li></ul><div class=\"code-block\" id=\"code_qwmpmt8fw\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 基本的库结构\n(library (my-math-lib)\n  (export square cube factorial)\n  (import (rnrs))\n  \n  (define (square x)\n    (* x x))\n  \n  (define (cube x)\n    (* x x x))\n  \n  (define (factorial n)\n    (if (&lt;= n 1)\n        1\n        (* n (factorial (- n 1))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_qwmpmt8fw')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_qwmpmt8fw')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 基本的库结构\n(library (my-math-lib)\n  (export square cube factorial)\n  (import (rnrs))\n  \n  (define (square x)\n    (* x x))\n  \n  (define (cube x)\n    (* x x x))\n  \n  (define (factorial n)\n    (if (&lt;= n 1)\n        1\n        (* n (factorial (- n 1))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>创建第一个库</h2><p>创建文件 <code>my-utilities.sls</code>：</p><div class=\"code-block\" id=\"code_aabt7icyh\"><pre class=\"code-display\"><code class=\"language-scheme\">;; my-utilities.sls\n(library (my-utilities)\n  (export string-reverse\n          list-sum\n          random-choice\n          safe-divide)\n  (import (rnrs)\n          (only (chezscheme) random))\n\n  ;; 字符串反转\n  (define (string-reverse str)\n    (list-&gt;string (reverse (string-&gt;list str))))\n\n  ;; 列表求和\n  (define (list-sum lst)\n    (fold-left + 0 lst))\n\n  ;; 随机选择\n  (define (random-choice lst)\n    (if (null? lst)\n        (error &quot;Cannot choose from empty list&quot;)\n        (list-ref lst (random (length lst)))))\n\n  ;; 安全除法\n  (define (safe-divide a b)\n    (if (zero? b)\n        'division-by-zero\n        (/ a b))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_aabt7icyh')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_aabt7icyh')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; my-utilities.sls\n(library (my-utilities)\n  (export string-reverse\n          list-sum\n          random-choice\n          safe-divide)\n  (import (rnrs)\n          (only (chezscheme) random))\n\n  ;; 字符串反转\n  (define (string-reverse str)\n    (list-&gt;string (reverse (string-&gt;list str))))\n\n  ;; 列表求和\n  (define (list-sum lst)\n    (fold-left + 0 lst))\n\n  ;; 随机选择\n  (define (random-choice lst)\n    (if (null? lst)\n        (error &quot;Cannot choose from empty list&quot;)\n        (list-ref lst (random (length lst)))))\n\n  ;; 安全除法\n  (define (safe-divide a b)\n    (if (zero? b)\n        'division-by-zero\n        (/ a b))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>使用库</h2><p>创建文件 <code>main.sls</code> 使用上面的库：</p><div class=\"code-block\" id=\"code_s84nyd22p\"><pre class=\"code-display\"><code class=\"language-scheme\">;; main.sls\n(import (rnrs)\n        (my-utilities))\n\n;; 使用导入的函数\n(display (string-reverse &quot;Hello&quot;))\n(newline)                              ; → &quot;olleH&quot;\n\n(display (list-sum '(1 2 3 4 5)))\n(newline)                              ; → 15\n\n(display (random-choice '(a b c d)))\n(newline)                              ; → 随机选择一个\n\n(display (safe-divide 10 3))\n(newline)                              ; → 10/3\n\n(display (safe-divide 10 0))\n(newline)                              ; → division-by-zero</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_s84nyd22p')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_s84nyd22p')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; main.sls\n(import (rnrs)\n        (my-utilities))\n\n;; 使用导入的函数\n(display (string-reverse &quot;Hello&quot;))\n(newline)                              ; → &quot;olleH&quot;\n\n(display (list-sum '(1 2 3 4 5)))\n(newline)                              ; → 15\n\n(display (random-choice '(a b c d)))\n(newline)                              ; → 随机选择一个\n\n(display (safe-divide 10 3))\n(newline)                              ; → 10/3\n\n(display (safe-divide 10 0))\n(newline)                              ; → division-by-zero</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>选择性导入</h2><div class=\"code-block\" id=\"code_sv8uyefne\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 只导入特定的函数\n(import (only (my-utilities) string-reverse list-sum))\n\n;; 重命名导入\n(import (rename (my-utilities) \n                (string-reverse str-rev)\n                (safe-divide divide)))\n\n(str-rev &quot;world&quot;)           ; → &quot;dlrow&quot;\n(divide 20 4)               ; → 5\n\n;; 导入除了指定函数外的所有函数\n(import (except (my-utilities) random-choice))\n\n;; 为库起别名\n(import (prefix (my-utilities) util:))\n\n(util:string-reverse &quot;test&quot;)  ; → &quot;tset&quot;\n(util:list-sum '(1 2 3))     ; → 6</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_sv8uyefne')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_sv8uyefne')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 只导入特定的函数\n(import (only (my-utilities) string-reverse list-sum))\n\n;; 重命名导入\n(import (rename (my-utilities) \n                (string-reverse str-rev)\n                (safe-divide divide)))\n\n(str-rev &quot;world&quot;)           ; → &quot;dlrow&quot;\n(divide 20 4)               ; → 5\n\n;; 导入除了指定函数外的所有函数\n(import (except (my-utilities) random-choice))\n\n;; 为库起别名\n(import (prefix (my-utilities) util:))\n\n(util:string-reverse &quot;test&quot;)  ; → &quot;tset&quot;\n(util:list-sum '(1 2 3))     ; → 6</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>库的版本控制</h2><div class=\"code-block\" id=\"code_injybwyvm\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 带版本号的库\n(library (my-math-lib (1 0))\n  (export pi-approx sin-approx cos-approx)\n  (import (rnrs))\n  \n  (define pi-approx 3.14159)\n  \n  (define (sin-approx x)\n    ;; 简化的正弦近似\n    (- x (/ (* x x x) 6)))\n  \n  (define (cos-approx x)\n    ;; 简化的余弦近似\n    (- 1 (/ (* x x) 2))))\n\n;; 导入特定版本\n(import (my-math-lib (1 0)))\n\n;; 导入版本范围\n(import (my-math-lib (&gt;= 1)))    ; 版本 &gt;= 1\n(import (my-math-lib (1 0) (2)))  ; 版本在 1.0 到 2.x 之间</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_injybwyvm')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_injybwyvm')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 带版本号的库\n(library (my-math-lib (1 0))\n  (export pi-approx sin-approx cos-approx)\n  (import (rnrs))\n  \n  (define pi-approx 3.14159)\n  \n  (define (sin-approx x)\n    ;; 简化的正弦近似\n    (- x (/ (* x x x) 6)))\n  \n  (define (cos-approx x)\n    ;; 简化的余弦近似\n    (- 1 (/ (* x x) 2))))\n\n;; 导入特定版本\n(import (my-math-lib (1 0)))\n\n;; 导入版本范围\n(import (my-math-lib (&gt;= 1)))    ; 版本 &gt;= 1\n(import (my-math-lib (1 0) (2)))  ; 版本在 1.0 到 2.x 之间</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>嵌套库</h2><div class=\"code-block\" id=\"code_rvr2bov06\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 创建 geometry/point.sls\n(library (geometry point)\n  (export make-point point-x point-y \n          point-distance point-translate)\n  (import (rnrs))\n  \n  (define-record-type point\n    (make-point x y)\n    point?\n    (x point-x)\n    (y point-y))\n  \n  (define (point-distance p1 p2)\n    (let ((dx (- (point-x p1) (point-x p2)))\n          (dy (- (point-y p1) (point-y p2))))\n      (sqrt (+ (* dx dx) (* dy dy)))))\n  \n  (define (point-translate p dx dy)\n    (make-point (+ (point-x p) dx)\n                (+ (point-y p) dy))))\n\n;; 创建 geometry/circle.sls\n(library (geometry circle)\n  (export make-circle circle-center circle-radius\n          circle-area circle-circumference\n          point-in-circle?)\n  (import (rnrs)\n          (geometry point))\n  \n  (define-record-type circle\n    (make-circle center radius)\n    circle?\n    (center circle-center)\n    (radius circle-radius))\n  \n  (define (circle-area c)\n    (* 3.14159 (expt (circle-radius c) 2)))\n  \n  (define (circle-circumference c)\n    (* 2 3.14159 (circle-radius c)))\n  \n  (define (point-in-circle? p c)\n    (&lt;= (point-distance p (circle-center c))\n        (circle-radius c))))\n\n;; 使用嵌套库\n(import (rnrs)\n        (geometry point)\n        (geometry style=\"display:none\"></div></div><h2>条件导出</h2><div class=\"code-block\" id=\"code_0tfbo1nlk\"><pre class=\"code-display\"><code class=\"language-scheme\">(library (platform-specific)\n  (export get-os current-time file-exists?)\n  (import (rnrs)\n          (chezscheme))\n  \n  ;; 根据平台条件性定义\n  (cond-expand\n    (windows\n     (define (get-os) 'windows)\n     (define (current-time)\n       ;; Windows 特定的时间获取\n       (current-date)))\n    (unix\n     (define (get-os) 'unix)\n     (define (current-time)\n       ;; Unix 特定的时间获取\n       (current-date)))\n    (else\n     (define (get-os) 'unknown)\n     (define (current-time)\n       (current-date))))\n  \n  ;; 通用函数\n  (define (file-exists? filename)\n    (guard (ex (else #f))\n      (call-with-input-file filename\n        (lambda (port) #t)))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_0tfbo1nlk')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_0tfbo1nlk')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">(library (platform-specific)\n  (export get-os current-time file-exists?)\n  (import (rnrs)\n          (chezscheme))\n  \n  ;; 根据平台条件性定义\n  (cond-expand\n    (windows\n     (define (get-os) 'windows)\n     (define (current-time)\n       ;; Windows 特定的时间获取\n       (current-date)))\n    (unix\n     (define (get-os) 'unix)\n     (define (current-time)\n       ;; Unix 特定的时间获取\n       (current-date)))\n    (else\n     (define (get-os) 'unknown)\n     (define (current-time)\n       (current-date))))\n  \n  ;; 通用函数\n  (define (file-exists? filename)\n    (guard (ex (else #f))\n      (call-with-input-file filename\n        (lambda (port) #t)))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>分离编译</h2><p>Chez Scheme 支持分离编译以提高性能：</p><pre class=\"code-display\"><code class=\"language-bash\"># 编译库\nscheme --compile-imported-libraries --program main.sls\n\n# 或者显式编译\necho '(compile-library &quot;my-utilities.sls&quot;)' | scheme -q\necho '(compile-program &quot;main.sls&quot;)' | scheme -q\n\n# 运行编译后的程序\nscheme --program main.so</code></pre><p>在代码中控制编译：</p><div class=\"code-block\" id=\"code_fjxz7yg3s\"><pre class=\"code-display\"><code class=\"language-scheme\">;; compile-demo.sls\n(library (compile-demo)\n  (export run-demo)\n  (import (rnrs))\n  \n  ;; 编译时计算\n  (define-syntax compile-time-calc\n    (lambda (stx)\n      (syntax-case stx ()\n        ((compile-time-calc expr)\n         (let ((result (eval (syntax-&gt;datum #'expr) (environment '(rnrs)))))\n           #`(quote #,result))))))\n  \n  (define precomputed-value \n    (compile-time-calc (* 12345 67890)))\n  \n  (define (run-demo)\n    (printf &quot;Precomputed at compile time: ~a~n&quot; precomputed-value)))\n\n;; 使用\n(import (compile-demo))\n(run-demo)  ; → Precomputed at compile time: 838102050</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_fjxz7yg3s')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_fjxz7yg3s')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; compile-demo.sls\n(library (compile-demo)\n  (export run-demo)\n  (import (rnrs))\n  \n  ;; 编译时计算\n  (define-syntax compile-time-calc\n    (lambda (stx)\n      (syntax-case stx ()\n        ((compile-time-calc expr)\n         (let ((result (eval (syntax-&gt;datum #'expr) (environment '(rnrs)))))\n           #`(quote #,result))))))\n  \n  (define precomputed-value \n    (compile-time-calc (* 12345 67890)))\n  \n  (define (run-demo)\n    (printf &quot;Precomputed at compile time: ~a~n&quot; precomputed-value)))\n\n;; 使用\n(import (compile-demo))\n(run-demo)  ; → Precomputed at compile time: 838102050</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>宏与模块</h2><div class=\"code-block\" id=\"code_gtz9stdbj\"><pre class=\"code-display\"><code class=\"language-scheme\">;; macro-lib.sls\n(library (macro-lib)\n  (export when-let define-constant for-each-indexed)\n  (import (rnrs))\n  \n  ;; 条件绑定宏\n  (define-syntax when-let\n    (syntax-rules ()\n      ((when-let ((var expr)) body ...)\n       (let ((var expr))\n         (when var\n           body ...)))))\n  \n  ;; 常量定义宏\n  (define-syntax define-constant\n    (syntax-rules ()\n      ((define-constant name value)\n       (begin\n         (define name value)\n         (set! name value)))))  ; 防止修改\n  \n  ;; 带索引的 for-each\n  (define-syntax for-each-indexed\n    (syntax-rules ()\n      ((for-each-indexed (index-var item-var) list-expr body ...)\n       (let loop ((items list-expr) (index-var 0))\n         (unless (null? items)\n           (let ((item-var (car items)))\n             body ...\n             (loop (cdr items) (+ index-var 1)))))))))\n\n;; 使用宏库\n(import (rnrs) (macro-lib))\n\n(when-let ((x (find even? '(1 3 5 4 7))))\n  (printf &quot;Found even number: ~a~n&quot; x))\n\n(define-constant PI 3.14159)\n\n(for-each-indexed (i item) '(a b c d)\n  (printf &quot;Item ~d: ~a~n&quot; i item))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_gtz9stdbj')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_gtz9stdbj')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; macro-lib.sls\n(library (macro-lib)\n  (export when-let define-constant for-each-indexed)\n  (import (rnrs))\n  \n  ;; 条件绑定宏\n  (define-syntax when-let\n    (syntax-rules ()\n      ((when-let ((var expr)) body ...)\n       (let ((var expr))\n         (when var\n           body ...)))))\n  \n  ;; 常量定义宏\n  (define-syntax define-constant\n    (syntax-rules ()\n      ((define-constant name value)\n       (begin\n         (define name value)\n         (set! name value)))))  ; 防止修改\n  \n  ;; 带索引的 for-each\n  (define-syntax for-each-indexed\n    (syntax-rules ()\n      ((for-each-indexed (index-var item-var) list-expr body ...)\n       (let loop ((items list-expr) (index-var 0))\n         (unless (null? items)\n           (let ((item-var (car items)))\n             body ...\n             (loop (cdr items) (+ index-var 1)))))))))\n\n;; 使用宏库\n(import (rnrs) (macro-lib))\n\n(when-let ((x (find even? '(1 3 5 4 7))))\n  (printf &quot;Found even number: ~a~n&quot; x))\n\n(define-constant PI 3.14159)\n\n(for-each-indexed (i item) '(a b c d)\n  (printf &quot;Item ~d: ~a~n&quot; i item))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>私有定义和辅助函数</h2><div class=\"code-block\" id=\"code_0vgzfe1wj\"><pre class=\"code-display\"><code class=\"language-scheme\">;; math-extended.sls\n(library (math-extended)\n  (export gcd-extended \n          prime? \n          factor\n          fibonacci-fast)\n  (import (rnrs))\n  \n  ;; 私有辅助函数（不导出）\n  (define (is-divisible? n d)\n    (zero? (mod n d)))\n  \n  (define (find-factor n start)\n    (cond\n      ((&gt; (* start start) n) #f)\n      ((is-divisible? n start) start)\n      (else (find-factor n (+ start 1)))))\n  \n  ;; 快速幂运算（私有）\n  (define (fast-expt base exp mod)\n    (cond\n      ((= exp 0) 1)\n      ((even? exp) \n       (mod (* (fast-expt base (/ exp 2) mod)\n               (fast-expt base (/ exp 2) mod))\n            mod))\n      (else \n       (mod (* base (fast-expt base (- exp 1) mod))\n            mod))))\n  \n  ;; 导出的公共函数\n  (define (gcd-extended a b)\n    (if (= b 0)\n        a\n        (gcd-extended b (mod a b))))\n  \n  (define (prime? n)\n    (if (&lt;= n 1)\n        #f\n        (not (find-factor n 2))))\n  \n  (define (factor n)\n    (let loop ((n n) (factors '()) (d 2))\n      (cond\n        ((= n 1) (reverse factors))\n        ((is-divisible? n d)\n         (loop (/ n d) (cons d factors) d))\n        (else\n         (loop n factors (+ d 1))))))\n  \n  ;; 使用矩阵快速计算斐波那契\n  (define (fibonacci-fast n)\n    (define (matrix-mult a b)\n      (let ((a00 (car a)) (a01 (cadr a)) (a10 (caddr a)) (a11 (cadddr a))\n            (b00 (car b)) (b01 (cadr b)) (b10 (caddr b)) (b11 (cadddr b)))\n        (list (+ (* a00 b00) (* a01 b10))\n              (+ (* a00 b01) (* a01 b11))\n              (+ (* a10 b00) (* a11 b10))\n              (+ (* a10 b01) (* a11 b11)))))\n    \n    (define (matrix-power matrix n)\n      (cond\n        ((= n 0) '(1 0 0 1))  ; 单位矩阵\n        ((= n 1) matrix)\n        ((even? n) \n         (let ((half (matrix-power matrix (/ n 2))))\n           (matrix-mult half half)))\n        (else\n         (matrix-mult matrix (matrix-power matrix (- n 1))))))\n    \n    (if (&lt;= n 0)\n        0\n        (cadr (matrix-power '(1 1 1 0) n)))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_0vgzfe1wj')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_0vgzfe1wj')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; math-extended.sls\n(library (math-extended)\n  (export gcd-extended \n          prime? \n          factor\n          fibonacci-fast)\n  (import (rnrs))\n  \n  ;; 私有辅助函数（不导出）\n  (define (is-divisible? n d)\n    (zero? (mod n d)))\n  \n  (define (find-factor n start)\n    (cond\n      ((&gt; (* start start) n) #f)\n      ((is-divisible? n start) start)\n      (else (find-factor n (+ start 1)))))\n  \n  ;; 快速幂运算（私有）\n  (define (fast-expt base exp mod)\n    (cond\n      ((= exp 0) 1)\n      ((even? exp) \n       (mod (* (fast-expt base (/ exp 2) mod)\n               (fast-expt base (/ exp 2) mod))\n            mod))\n      (else \n       (mod (* base (fast-expt base (- exp 1) mod))\n            mod))))\n  \n  ;; 导出的公共函数\n  (define (gcd-extended a b)\n    (if (= b 0)\n        a\n        (gcd-extended b (mod a b))))\n  \n  (define (prime? n)\n    (if (&lt;= n 1)\n        #f\n        (not (find-factor n 2))))\n  \n  (define (factor n)\n    (let loop ((n n) (factors '()) (d 2))\n      (cond\n        ((= n 1) (reverse factors))\n        ((is-divisible? n d)\n         (loop (/ n d) (cons d factors) d))\n        (else\n         (loop n factors (+ d 1))))))\n  \n  ;; 使用矩阵快速计算斐波那契\n  (define (fibonacci-fast n)\n    (define (matrix-mult a b)\n      (let ((a00 (car a)) (a01 (cadr a)) (a10 (caddr a)) (a11 (cadddr a))\n            (b00 (car b)) (b01 (cadr b)) (b10 (caddr b)) (b11 (cadddr b)))\n        (list (+ (* a00 b00) (* a01 b10))\n              (+ (* a00 b01) (* a01 b11))\n              (+ (* a10 b00) (* a11 b10))\n              (+ (* a10 b01) (* a11 b11)))))\n    \n    (define (matrix-power matrix n)\n      (cond\n        ((= n 0) '(1 0 0 1))  ; 单位矩阵\n        ((= n 1) matrix)\n        ((even? n) \n         (let ((half (matrix-power matrix (/ n 2))))\n           (matrix-mult half half)))\n        (else\n         (matrix-mult matrix (matrix-power matrix (- n 1))))))\n    \n    (if (&lt;= n 0)\n        0\n        (cadr (matrix-power '(1 1 1 0) n)))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>练习</h2><h3>练习1：数据结构库</h3><p>创建一个数据结构库，包含栈、队列、树等基本数据结构。</p><h3>练习2：字符串处理库</h3><p>实现一个字符串处理库，包含常用的字符串操作函数。</p><h3>练习3：测试框架</h3><p>创建一个简单的单元测试框架库。</p><h3>练习4：配置管理库</h3><p>实现一个配置文件读取和管理的库。</p><h3>练习5：日志库</h3><p>创建一个带不同级别的日志库。</p><h2>参考答案</h2><div class=\"code-block\" id=\"code_8l9miw23c\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 练习1：数据结构库 - data-structures.sls\n(library (data-structures)\n  (export make-stack stack-push! stack-pop! stack-empty?\n          make-queue queue-enqueue! queue-dequeue! queue-empty?\n          make-binary-tree tree-insert! tree-search tree-traverse)\n  (import (rnrs))\n  \n  ;; 栈实现\n  (define-record-type stack\n    (make-stack-internal items)\n    stack?\n    (items stack-items set-stack-items!))\n  \n  (define (make-stack)\n    (make-stack-internal '()))\n  \n  (define (stack-push! stack item)\n    (set-stack-items! stack (cons item (stack-items stack))))\n  \n  (define (stack-pop! stack)\n    (let ((items (stack-items stack)))\n      (if (null? items)\n          (error &quot;Stack is empty&quot;)\n          (let ((top (car items)))\n            (set-stack-items! stack (cdr items))\n            top))))\n  \n  (define (stack-empty? stack)\n    (null? (stack-items stack)))\n  \n  ;; 队列实现\n  (define-record-type queue\n    (make-queue-internal front rear)\n    queue?\n    (front queue-front set-queue-front!)\n    (rear queue-rear set-queue-rear!))\n  \n  (define (make-queue)\n    (make-queue-internal '() '()))\n  \n  (define (queue-enqueue! queue item)\n    (let ((new-item (list item)))\n      (if (null? (queue-front queue))\n          (begin\n            (set-queue-front! queue new-item)\n            (set-queue-rear! queue new-item))\n          (begin\n            (set-cdr! (queue-rear queue) new-item)\n            (set-queue-rear! queue new-item)))))\n  \n  (define (queue-dequeue! queue)\n    (if (null? (queue-front queue))\n        (error &quot;Queue is empty&quot;)\n        (let ((item (car (queue-front queue))))\n          (set-queue-front! queue (cdr (queue-front queue)))\n          (when (null? (queue-front queue))\n            (set-queue-rear! queue '()))\n          item)))\n  \n  (define (queue-empty? queue)\n    (null? (queue-front queue)))\n  \n  ;; 二叉搜索树实现\n  (define-record-type tree-node\n    (make-tree-node value left right)\n    tree-node?\n    (value tree-node-value)\n    (left tree-node-left set-tree-node-left!)\n    (right tree-node-right set-tree-node-right!))\n  \n  (define-record-type binary-tree\n    (make-binary-tree root)\n    binary-tree?\n    (root tree-root set-tree-root!))\n  \n  (define (tree-insert! tree value)\n    (define (insert-node node value)\n      (cond\n        ((not node) (make-tree-node value #f #f))\n        ((&lt; value (tree-node-value node))\n         (set-tree-node-left! node (insert-node (tree-node-left node) value))\n         node)\n        ((&gt; value (tree-node-value node))\n         (set-tree-node-right! node (insert-node (tree-node-right node) value))\n         node)\n        (else node)))\n    (set-tree-root! tree (insert-node (tree-root tree) value)))\n  \n  (define (tree-search tree value)\n    (define (search-node node value)\n      (cond\n        ((not node) #f)\n        ((= value (tree-node-value node)) #t)\n        ((&lt; value (tree-node-value node)) \n         (search-node (tree-node-left node) value))\n        (else (search-node (tree-node-right node) value))))\n    (search-node (tree-root tree) value))\n  \n  (define (tree-traverse tree order)\n    (define (traverse-node node acc)\n      (if (not node)\n          acc\n          (case order\n            ((inorder)\n             (append (traverse-node (tree-node-left node) '())\n                     (list (tree-node-value node))\n                     (traverse-node (tree-node-right node) '())))\n            ((preorder)\n             (cons (tree-node-value node)\n                   (append (traverse-node (tree-node-left node) '())\n                           (traverse-node (tree-node-right node) '()))))\n            ((postorder)\n             (append (traverse-node (tree-node-left node) '())\n                     (traverse-node (tree-node-right node) '())\n                     (list (tree-node-value node)))))))\n    (traverse-node (tree-root tree) '())))\n\n;; 练习3：简单测试框架 - simple-test.sls\n(library (simple-test)\n  (export define-test run-tests test-equal test-true test-false)\n  (import (rnrs))\n  \n  (define *tests* '())\n  (define *passed* 0)\n  (define *failed* 0)\n  \n  (define-syntax define-test\n    (syntax-rules ()\n      ((define-test name body ...)\n       (set! *tests* (cons (cons 'name (lambda () body ...)) *tests*)))))\n  \n  (define (test-equal expected actual)\n    (if (equal? expected actual)\n        (begin\n          (set! *passed* (+ *passed* 1))\n          (printf &quot;✓ PASS~n&quot;))\n        (begin\n          (set! *failed* (+ *failed* 1))\n          (printf &quot;✗ FAIL: expected ~a, got ~a~n&quot; expected actual))))\n  \n  (define (test-true actual)\n    (test-equal #t actual))\n  \n  (define (test-false actual)\n    (test-equal #f actual))\n  \n  (define (run-tests)\n    (set! *passed* 0)\n    (set! *failed* 0)\n    (for-each (lambda (test)\n                (printf &quot;Running test: ~a~n&quot; (car test))\n                ((cdr test))\n                (newline))\n              (reverse *tests*))\n    (printf &quot;~nResults: ~a passed, ~a failed~n&quot; *passed* *failed*)))\n\n;; 练习5：日志库 - logger.sls\n(library (logger)\n  (export log-debug log-info log-warn log-error \n          set-log-level! set-log-output!)\n  (import (rnrs) (chezscheme))\n  \n  (define *log-level* 'info)\n  (define *log-output* (current-output-port))\n  (define *log-levels* '((debug . 0) (info . 1) (warn . 2) (error . 3)))\n  \n  (define (level-number level)\n    (cdr (assq level *log-levels*)))\n  \n  (define (should-log? level)\n    (&gt;= (level-number level) (level-number *log-level*)))\n  \n  (define (format-timestamp)\n    (let ((now (current-date)))\n      (format &quot;~4,'0d-~2,'0d-~2,'0d ~2,'0d:~2,'0d:~2,'0d&quot;\n              (date-year now) (date-month now) (date-day now)\n              (date-hour now) (date-minute now) (date-second now))))\n  \n  (define (log-message level format-str . args)\n    (when (should-log? level)\n      (fprintf *log-output* &quot;[~a] ~a: ~a~n&quot;\n               (format-timestamp)\n               (string-upcase (symbol-&gt;string level))\n               (apply format format-str args))\n      (flush-output-port *log-output*)))\n  \n  (define (log-debug format-str . args)\n    (apply log-message 'debug format-str args))\n  \n  (define (log-info format-str . args)\n    (apply log-message 'info format-str args))\n  \n  (define (log-warn format-str . args)\n    (apply log-message 'warn format-str args))\n  \n  (define (log-error format-str . args)\n    (apply log-message 'error format-str args))\n  \n  (define (set-log-level! level)\n    (set! *log-level* level))\n  \n  (define (set-log-output! port)\n    (set! *log-output* port)))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_ eEdit('code_ei4koh2sz')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_ei4koh2sz')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 编译单个文件\n(compile-file &quot;my-program.ss&quot;)  ; 生成 my-program.so\n\n;; 编译时指定选项\n(compile-file &quot;my-program.ss&quot; &quot;output.so&quot;)\n\n;; 编译整个库\n(compile-library &quot;my-lib.sls&quot;) ; 生成 my-lib.so\n\n;; 编译程序\n(compile-program &quot;main.ss&quot;)    ; 生成 main.so\n\n;; 在程序中动态加载编译后的代码\n(load &quot;my-program.so&quot;)\n\n;; 检查是否需要重新编译\n(define (needs-recompile? source compiled)\n  (or (not (file-exists? compiled))\n      (&gt; (file-modification-time source)\n         (file-modification-time compiled))))\n\n;; 条件编译\n(when (needs-recompile? &quot;my-lib.sls&quot; &quot;my-lib.so&quot;)\n  (compile-library &quot;my-lib.sls&quot;))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>编译控制</h3><div class=\"code-block\" id=\"code_jqy0diqmh\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 设置优化级别\n(optimize-level 3)  ; 0-3，3 是最高优化\n\n;; 设置调试信息\n(debug-level 1)     ; 0-3，0 关闭调试信息\n\n;; 编译时求值\n(eval-when (compile)\n  (printf &quot;This runs at compile time~n&quot;))\n\n(eval-when (load)\n  (printf &quot;This runs at load time~n&quot;))\n\n(eval-when (eval)\n  (printf &quot;This runs at eval time~n&quot;))\n\n;; 内联函数声明\n(define-syntax define-inline\n  (syntax-rules ()\n    ((define-inline (name args ...) body ...)\n     (begin\n       (define name\n         (lambda (args ...) body ...))\n       (set-symbol-property! 'name '*inline* #t)))))\n\n;; 类型声明（优化提示）\n(define (fast-add x y)\n  (declare (fixnum x y))  ; 声明为固定精度整数\n  (fx+ x y))              ; 使用快速fixnum运算</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_jqy0diqmh')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_jqy0diqmh')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 设置优化级别\n(optimize-level 3)  ; 0-3，3 是最高优化\n\n;; 设置调试信息\n(debug-level 1)     ; 0-3，0 关闭调试信息\n\n;; 编译时求值\n(eval-when (compile)\n  (printf &quot;This runs at compile time~n&quot;))\n\n(eval-when (load)\n  (printf &quot;This runs at load time~n&quot;))\n\n(eval-when (eval)\n  (printf &quot;This runs at eval time~n&quot;))\n\n;; 内联函数声明\n(define-syntax define-inline\n  (syntax-rules ()\n    ((define-inline (name args ...) body ...)\n     (begin\n       (define name\n         (lambda (args ...) body ...))\n       (set-symbol-property! 'name '*inline* #t)))))\n\n;; 类型声明（优化提示）\n(define (fast-add x y)\n  (declare (fixnum x y))  ; 声明为固定精度整数\n  (fx+ x y))              ; 使用快速fixnum运算</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>外部函数接口 (FFI)</h2><h3>调用 C 函数</h3><div class=\"code-block\" id=\"code_ohv5p9zhl\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 声明外部函数\n(define libc-strlen\n  (foreign-procedure &quot;strlen&quot; (string) size_t))\n\n(define libc-strcmp\n  (foreign-procedure &quot;strcmp&quot; (string string) int))\n\n(define libc-malloc\n  (foreign-procedure &quot;malloc&quot; (size_t) void*))\n\n(define libc-free\n  (foreign-procedure &quot;free&quot; (void*) void))\n\n;; 使用外部函数\n(libc-strlen &quot;Hello, World!&quot;)  ; → 13\n(libc-strcmp &quot;abc&quot; &quot;def&quot;)      ; → -3\n\n;; 处理指针\n(define ptr (libc-malloc 100))  ; 分配 100 字节\n(libc-free ptr)                 ; 释放内存\n\n;; 复杂的 FFI 示例：调用 math 库\n(load-shared-object &quot;libm.so&quot;)  ; Linux\n; (load-shared-object &quot;libm.dylib&quot;)  ; macOS\n\n(define c-sin (foreign-procedure &quot;sin&quot; (double) double))\n(define c-cos (foreign-procedure &quot;cos&quot; (double) double))\n(define c-sqrt (foreign-procedure &quot;sqrt&quot; (double) double))\n\n(c-sin 1.0)     ; → 0.8414709848078965\n(c-cos 0.0)     ; → 1.0\n(c-sqrt 16.0)   ; → 4.0</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_ohv5p9zhl')\">✏️ 编辑</button><button class=\"btn-run\ )\n      (let loop ((i 0))\n        (when (&lt; i 5)\n          (printf &quot;Thread 1: ~d~n&quot; i)\n          (sleep (make-time 'time-duration 0 1))  ; 睡眠1秒\n          (loop (+ i 1)))))))\n\n(define thread2\n  (fork-thread\n    (lambda ()\n      (let loop ((i 0))\n        (when (&lt; i 3)\n          (printf &quot;Thread 2: ~d~n&quot; i)\n          (sleep (make-time 'time-duration 0 2))  ; 睡眠2秒\n          (loop (+ i 1)))))))\n\n;; 等待线程完成\n(thread-join thread1)\n(thread-join thread2)\n\n;; 获取当前线程\n(current-thread)\n\n;; 线程睡眠\n(sleep (make-time 'time-duration 500000000 0))  ; 0.5秒</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>互斥锁和同步</h3><div class=\"code-block\" id=\"code_f8fhxx1lw\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 创建互斥锁\n(define my-mutex (make-mutex))\n\n;; 使用互斥锁\n(define shared-counter 0)\n\n(define (increment-counter!)\n  (with-mutex my-mutex\n    (set! shared-counter (+ shared-counter 1))))\n\n;; 多线程安全的操作\n(define threads\n  (map (lambda (i)\n         (fork-thread\n           (lambda ()\n             (let loop ((j 0))\n               (when (&lt; j 100)\n                 (increment-counter!)\n                 (loop (+ j 1)))))))\n       (iota 10)))  ; 创建10个线程\n\n;; 等待所有线程完成\n(for-each thread-join threads)\n(printf &quot;Final counter value: ~d~n&quot; shared-counter)  ; 应该是 1000\n\n;; 条件变量\n(define my-condition (make-condition))\n(define data-ready #f)\n\n(define producer\n  (fork-thread\n    (lambda ()\n      (sleep (make-time 'time-duration 0 2))\n      (with-mutex my-mutex\n        (set! data-ready #t)\n        (condition-signal my-condition)))))\n\n(define consumer\n  (fork-thread\n    (lambda ()\n      (with-mutex my-mutex\n        (let loop ()\n          (unless data-ready\n            (condition-wait my-condition my-mutex)\n            (loop))))\n      (printf &quot;Data is ready!~n&quot;))))\n\n(thread-join producer)\n(thread-join consumer)</code></pre><div class=\"code-actions\"><button class=\ int-indented &quot;Level 1&quot;)\n  (parameterize ((current-indent 2))\n    (print-indented &quot;Level 2&quot;)))\n(print-indented &quot;Back to Level 0&quot;)\n\n;; 输出:\n; Level 0\n; &gt;&gt;&gt;   Level 1\n; &gt;&gt;&gt;     Level 2\n; Level 0</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_febaxpci0')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_febaxpci0')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 创建参数\n(define current-indent (make-parameter 0))\n(define current-prefix (make-parameter &quot;&quot;))\n\n;; 使用参数\n(define (print-indented text)\n  (let ((indent-str (make-string (* (current-indent) 2) #\\space)))\n    (printf &quot;~a~a~a~n&quot; (current-prefix) indent-str text)))\n\n;; 临时修改参数\n(print-indented &quot;Level 0&quot;)\n(parameterize ((current-indent 1)\n               (current-prefix &quot;&gt;&gt;&gt; &quot;))\n  (print-indented &quot;Level 1&quot;)\n  (parameterize ((current-indent 2))\n    (print-indented &quot;Level 2&quot;)))\n(print-indented &quot;Back to Level 0&quot;)\n\n;; 输出:\n; Level 0\n; &gt;&gt;&gt;   Level 1\n; &gt;&gt;&gt;     Level 2\n; Level 0</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>垃圾回收器管理</h2><h3>Guardians - 终结器</h3><div class=\"code-block\" id=\"code_1ncejxuel\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 创建 guardian\n(define my-guardian (make-guardian))\n\n;; 需要清理的对象\n(define-record-type resource\n  (make-resource name cleanup-proc)\n  resource?\n  (name resource-name)\n  (cleanup-proc resource-cleanup))\n\n;; 创建资源并注册到 guardian\n(define (create-resource name)\n  (let ((res (make-resource name \n                            (lambda () \n                              (printf &quot;Cleaning up resource: ~a~n&quot; name)))))\n    (my-guardian res)  ; 注册到 guardian\n    res))\n\n;; 清理函数\n(define (cleanup-resources)\n  (let loop ((obj (my-guardian)))\n    (when obj\n      ((resource-cleanup obj))\n      (loop (my-guardian)))))\n\n;; 使用示例\n(define res1 (create-resource &quot;Resource 1&quot;))\n(define res2 (create-resource &quot;Resource 2&quot;))\n(set! res1 #f)  ; 让对象变得可回收\n(set! res2 #f)\n(collect)       ; 强制垃圾回收\n(cleanup-resources)\n\n;; 输出: Cleaning up resource: Resource 1\n;       Cleaning up resource: Resource 2</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_1ncejxuel')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_1ncejxuel')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 创建 guardian\n(define my-guardian (make-guardian))\n\n;; 需要清理的对象\n(define-record-type resource\n  (make-resource name cleanup-proc)\n  resource?\n  (name resource-name)\n  (cleanup-proc resource-cleanup))\n\n;; 创建资源并注册到 guardian\n(define (create-resource name)\n  (let ((res (make-resource name \n                            (lambda () \n                              (printf &quot;Cleaning up resource: ~a~n&quot; name)))))\n    (my-guardian res)  ; 注册到 guardian\n    res))\n\n;; 清理函数\n(define (cleanup-resources)\n  (let loop ((obj (my-guardian)))\n    (when obj\n      ((resource-cleanup obj))\n      (loop (my-guardian)))))\n\n;; 使用示例\n(define res1 (create-resource &quot;Resource 1&quot;))\n(define res2 (create-resource &quot;Resource 2&quot;))\n(set! res1 #f)  ; 让对象变得可回收\n(set! res2 #f)\n(collect)       ; 强制垃圾回收\n(cleanup-resources)\n\n;; 输出: Cleaning up resource: Resource 1\n;       Cleaning up resource: Resource 2</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>内存管理</h3><div class=\"code-block\" id=\"code_h0641s71t\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 手动触发垃圾回收\n(collect)\n\n;; 查看内存统计\n(collect-request-handler\n  (lambda ()\n    (printf &quot;Memory collection requested~n&quot;)))\n\n;; 获取内存使用信息\n(define (show-memory-info)\n  (let ((stats (statistics)))\n    (printf &quot;Bytes allocated: ~d~n&quot; (sstats-bytes stats))\n    (printf &quot;CPU time: ~d ms~n&quot; (sstats-cpu stats))))\n\n;; 设置垃圾回收参数\n(collect-generation-radix 4)  ; 设置分代收集基数</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_h0641s71t')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_h0641s71t')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 手动触发垃圾回收\n(collect)\n\n;; 查看内存统计\n(collect-request-handler\n  (lambda ()\n    (printf &quot;Memory collection requested~n&quot;)))\n\n;; 获取内存使用信息\n(define (show-memory-info)\n  (let ((stats (statistics)))\n    (printf &quot;Bytes allocated: ~d~n&quot; (sstats-bytes stats))\n    (printf &quot;CPU time: ~d ms~n&quot; (sstats-cpu stats))))\n\n;; 设置垃圾回收参数\n(collect-generation-radix 4)  ; 设置分代收集基数</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>执行引擎 (Engines)</h2><div class=\"code-block\" id=\"code_uyikuuiyl\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 创建执行引擎\n(define (make-counting-engine n)\n  (make-engine\n    (lambda ()\n      (let loop ((i 0))\n        (if (&lt; i n)\n            (begin\n              (printf &quot;Count: ~d~n&quot; i)\n              (loop (+ i 1)))\n            'done)))))\n\n;; 运行引擎，限制执行步数\n(define engine (make-counting-engine 10))\n(let ((result (engine 100 #f)))  ; 运行100步\n  (if (procedure? result)\n      (printf &quot;Engine didn't complete, continuing...~n&quot;)\n      (printf &quot;Engine completed with result: ~a~n&quot; result)))\n\n;; 时间片轮转调度示例\n(define (round-robin-scheduler engines time-slice)\n  (let loop ((remaining engines))\n    (unless (null? remaining)\n      (let* ((engine (car remaining))\n             (result (engine time-slice #f)))\n        (if (procedure? result)\n            ;; 引擎没完成，继续调度\n            (loop (append (cdr remaining) (list result)))\n            ;; 引擎完成了\n            (begin\n              (printf &quot;Engine completed: ~a~n&quot; result)\n              (loop (cdr remaining))))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_uyikuuiyl')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_uyikuuiyl')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 创建执行引擎\n(define (make-counting-engine n)\n  (make-engine\n    (lambda ()\n      (let loop ((i 0))\n        (if (&lt; i n)\n            (begin\n              (printf &quot;Count: ~d~n&quot; i)\n              (loop (+ i 1)))\n            'done)))))\n\n;; 运行引擎，限制执行步数\n(define engine (make-counting-engine 10))\n(let ((result (engine 100 #f)))  ; 运行100步\n  (if (procedure? result)\n      (printf &quot;Engine didn't complete, continuing...~n&quot;)\n      (printf &quot;Engine completed with result: ~a~n&quot; result)))\n\n;; 时间片轮转调度示例\n(define (round-robin-scheduler engines time-slice)\n  (let loop ((remaining engines))\n    (unless (null? remaining)\n      (let* ((engine (car remaining))\n             (result (engine time-slice #f)))\n        (if (procedure? result)\n            ;; 引擎没完成，继续调度\n            (loop (append (cdr remaining) (list result)))\n            ;; 引擎完成了\n            (begin\n              (printf &quot;Engine completed: ~a~n&quot; result)\n              (loop (cdr remaining))))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>检查器系统</h2><h3>inspect 交互式检查</h3><div class=\"code-block\" id=\"code_bgg3vlzpo\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 检查数据结构\n(define complex-data\n  '((name . &quot;John Doe&quot;)\n    (age . 30)\n    (address . ((street . &quot;123 Main St&quot;)\n                (city . &quot;Anytown&quot;)\n                (zipcode . &quot;12345&quot;)))\n    (hobbies . (programming reading cycling))))\n\n;; 在 REPL 中使用\n; (inspect complex-data)\n; 这会启动交互式检查器，可以导航数据结构\n\n;; 程序化检查\n(define (inspect-data data)\n  (cond\n    ((pair? data)\n     (printf &quot;Pair: (~a . ~a)~n&quot; (car data) (cdr data)))\n    ((list? data)\n     (printf &quot;List of ~d elements~n&quot; (length data)))\n    ((vector? data)\n     (printf &quot;Vector of ~d elements~n&quot; (vector-length data)))\n    (else\n     (printf &quot;Atom: ~a~n&quot; data))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_bgg3vlzpo')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_bgg3vlzpo')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 检查数据结构\n(define complex-data\n  '((name . &quot;John Doe&quot;)\n    (age . 30)\n    (address . ((street . &quot;123 Main St&quot;)\n                (city . &quot;Anytown&quot;)\n                (zipcode . &quot;12345&quot;)))\n    (hobbies . (programming reading cycling))))\n\n;; 在 REPL 中使用\n; (inspect complex-data)\n; 这会启动交互式检查器，可以导航数据结构\n\n;; 程序化检查\n(define (inspect-data data)\n  (cond\n    ((pair? data)\n     (printf &quot;Pair: (~a . ~a)~n&quot; (car data) (cdr data)))\n    ((list? data)\n     (printf &quot;List of ~d elements~n&quot; (length data)))\n    ((vector? data)\n     (printf &quot;Vector of ~d elements~n&quot; (vector-length data)))\n    (else\n     (printf &quot;Atom: ~a~n&quot; data))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>调试支持</h3><div class=\"code-block\" id=\"code_rqtb1udt3\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 追踪函数调用\n(define (factorial n)\n  (if (&lt;= n 1)\n      1\n      (* n (factorial (- n 1)))))\n\n(trace factorial)\n(factorial 5)\n; 输出每次递归调用和返回值\n(untrace factorial)\n\n;; 断点和单步执行\n(define (debug-factorial n)\n  (break)  ; 设置断点\n  (if (&lt;= n 1)\n      1\n      (* n (debug-factorial (- n 1)))))\n\n;; pretty-print 美化输出\n(pretty-print complex-data)\n; 输出格式化的数据结构\n\n;; 控制输出格式\n(parameterize ((print-length 10)    ; 最多打印10个元素\n               (print-level 3))     ; 最多打印3层嵌套\n  (pretty-print complex-data))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_rqtb1udt3')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_rqtb1udt3')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 追踪函数调用\n(define (factorial n)\n  (if (&lt;= n 1)\n      1\n      (* n (factorial (- n 1)))))\n\n(trace factorial)\n(factorial 5)\n; 输出每次递归调用和返回值\n(untrace factorial)\n\n;; 断点和单步执行\n(define (debug-factorial n)\n  (break)  ; 设置断点\n  (if (&lt;= n 1)\n      1\n      (* n (debug-factorial (- n 1)))))\n\n;; pretty-print 美化输出\n(pretty-print complex-data)\n; 输出格式化的数据结构\n\n;; 控制输出格式\n(parameterize ((print-length 10)    ; 最多打印10个元素\n               (print-level 3))     ; 最多打印3层嵌套\n  (pretty-print complex-data))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>高级特性</h2><h3>代码生成和动态求值</h3><div class=\"code-block\" id=\"code_ivdu37wax\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 动态生成和编译代码\n(define (make-adder n)\n  (let ((code `(lambda (x) (+ x ,n))))\n    (eval code)))\n\n(define add5 (make-adder 5))\n(add5 10)  ; → 15\n\n;; 运行时代码生成\n(define (generate-accessor field)\n  (let ((getter-name (string-&gt;symbol (string-append &quot;get-&quot; field)))\n        (setter-name (string-&gt;symbol (string-append &quot;set-&quot; field &quot;!&quot;))))\n    `(begin\n       (define (,getter-name obj)\n         (cdr (assoc ',field obj)))\n       (define (,setter-name obj value)\n         (let ((entry (assoc ',field obj)))\n           (if entry\n               (set-cdr! entry value)\n               (error &quot;Field not found&quot; ',field)))))))\n\n;; 生成访问器\n(eval (generate-accessor &quot;name&quot;))\n(eval (generate-accessor &quot;age&quot;))\n\n(define person '((name . &quot;Alice&quot;) (age . 25)))\n(get-name person)    ; → &quot;Alice&quot;\n(set-age! person 26)\n(get-age person)     ; → 26</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_ivdu37wax')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_ivdu37wax')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 动态生成和编译代码\n(define (make-adder n)\n  (let ((code `(lambda (x) (+ x ,n))))\n    (eval code)))\n\n(define add5 (make-adder 5))\n(add5 10)  ; → 15\n\n;; 运行时代码生成\n(define (generate-accessor field)\n  (let ((getter-name (string-&gt;symbol (string-append &quot;get-&quot; field)))\n        (setter-name (string-&gt;symbol (string-append &quot;set-&quot; field &quot;!&quot;))))\n    `(begin\n       (define (,getter-name obj)\n         (cdr (assoc ',field obj)))\n       (define (,setter-name obj value)\n         (let ((entry (assoc ',field obj)))\n           (if entry\n               (set-cdr! entry value)\n               (error &quot;Field not found&quot; ',field)))))))\n\n;; 生成访问器\n(eval (generate-accessor &quot;name&quot;))\n(eval (generate-accessor &quot;age&quot;))\n\n(define person '((name . &quot;Alice&quot;) (age . 25)))\n(get-name person)    ; → &quot;Alice&quot;\n(set-age! person 26)\n(get-age person)     ; → 26</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>练习</h2><h3>练习1：文件监视器</h3><p>使用 FFI 调用系统 API 实现文件变化监视。</p><h3>练习2：线程池</h3><p>实现一个线程池，可以提交任务并获取结果。</p><h3>练习3：资源管理器</h3><p>使用 guardian 实现自动资源清理系统。</p><h3>练习4：简单 JIT</h3><p>使用代码生成实现简单的表达式即时编译器。</p><h3>练习5：协作式多任务</h3><p>使用 engine 实现协作式多任务调度系统。</p><h2>参考答案</h2><div class=\"code-block\" id=\"code_q4y001c3b\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 练习2：线程池\n(define (make-thread-pool size)\n  (let ((tasks (make-queue))\n        (task-mutex (make-mutex))\n        (task-condition (make-condition))\n        (workers '())\n        (results (make-hashtable equal-hash equal?)))\n    \n    ;; 工作者线程\n    (define (worker-thread)\n      (let loop ()\n        (let ((task #f))\n          (with-mutex task-mutex\n            (let wait-for-task ()\n              (if (queue-empty? tasks)\n                  (begin\n                    (condition-wait task-condition task-mutex)\n                    (wait-for-task))\n                  (set! task (queue-dequeue! tasks)))))\n          \n          (when task\n            (let* ((task-id (car task))\n                   (task-proc (cdr task))\n                   (result (guard (ex (else ex)) (task-proc))))\n              (hashtable-set! results task-id result))\n            (loop)))))\n    \n    ;; 创建工作者线程\n    (set! workers\n          (map (lambda (i) (fork-thread worker-thread))\n               (iota size)))\n    \n    ;; 返回线程池接口\n    (lambda (operation . args)\n      (case operation\n        ((submit)\n         (let ((task-id (gensym))\n               (task-proc (car args)))\n           (with-mutex task-mutex\n             (queue-enqueue! tasks (cons task-id task-proc))\n             (condition-signal task-condition))\n           task-id))\n        ((get-result)\n         (let ((task-id (car args)))\n           (hashtable-ref results task-id 'not-ready)))\n        ((shutdown)\n         (for-each thread-terminate workers))))))\n\n;; 练习3：资源管理器\n(define (make-resource-manager)\n  (let ((guardian (make-guardian))\n        (resources (make-hashtable eq-hash eq?)))\n    \n    (define (cleanup-thread)\n      (let loop ()\n        (let ((obj (guardian)))\n          (when obj\n            (let ((cleanup (hashtable-ref resources obj #f)))\n              (when cleanup\n                (cleanup)\n                (hashtable-delete! resources obj)))))\n        (sleep (make-time 'time-duration 100000000 0))  ; 100ms\n        (loop)))\n    \n    ;; 启动清理线程\n    (fork-thread cleanup-thread)\n    \n    (lambda (operation . args)\n      (case operation\n        ((register)\n         (let ((obj (car args))\n               (cleanup-proc (cadr args)))\n           (hashtable-set! resources obj cleanup-proc)\n           (guardian obj)))\n        ((unregister)\n         (let ((obj (car args)))\n           (hashtable-delete! resources obj)))))))\n\n;; 练习4：简单表达式编译器\n(define (compile-expression expr)\n  (cond\n    ((number? expr) \n     `(lambda () ,expr))\n    ((symbol? expr)\n     `(lambda () ,expr))\n    ((and (pair? expr) (eq? (car expr) '+))\n     (let ((left (compile-expression (cadr expr)))\n           (right (compile-expression (caddr expr))))\n       `(lambda () (+ (,left) (,right)))))\n    ((and (pair? expr) (eq? (car expr) '*))\n     (let ((left (compile-expression (cadr expr)))\n           (right (compile-expression (caddr expr))))\n       `(lambda () (* (,left) (,right)))))\n    (else\n     (error &quot;Unknown expression&quot; expr))))\n\n;; 使用\n(define compiled (eval (compile-expression '(+ (* 2 3) 4))))\n(compiled)  ; → 10\n\n;; 练习5：协作式多任务\n(define (make-cooperative-scheduler)\n  (let ((tasks '())\n        (current-task #f))\n    \n    (define (add-task! name proc)\n      (set! tasks (append tasks (list (cons name proc)))))\n    \n    (define (yield-task)\n      (make-engine\n        (lambda ()\n          (if current-task\n              ((cdr current-task))\n              'no-task))))\n    \n    (define (run-scheduler time-slice)\n      (let loop ((remaining tasks))\n        (unless (null? remaining)\n          (set! current-task (car remaining))\n          (let ((engine (yield-task)))\n            (let ((result (engine time-slice #f)))\n              (if (procedure? result)\n                  ;; 任务未完成，重新调度\n                  (begin\n                    (set-cdr! current-task result)\n                    (loop (append (cdr remaining) (list current-task))))\n                  ;; 任务完成\n                  (begin\n                    (printf &quot;Task ~a completed: ~a~n&quot; \n                            (car current-task) result)\n                    (loop (cdr remaining)))))))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add) (add-task! (car args) (cadr args)))\n        ((run) (run-scheduler (if (null? args) 100 (car args))))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_q4y001c3b')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode(
