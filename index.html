               (hashtable-delete! resources obj)))))\n        (sleep (make-time 'time-duration 100000000 0))  ; 100ms\n        (loop)))\n    \n    ;; 启动清理线程\n    (fork-thread cleanup-thread)\n    \n    (lambda (operation . args)\n      (case operation\n        ((register)\n         (let ((obj (car args))\n               (cleanup-proc (cadr args)))\n           (hashtable-set! resources obj cleanup-proc)\n           (guardian obj)))\n        ((unregister)\n         (let ((obj (car args)))\n           (hashtable-delete! resources obj)))))))\n\n;; 练习4：简单表达式编译器\n(define (compile-expression expr)\n  (cond\n    ((number? expr) \n     `(lambda () ,expr))\n    ((symbol? expr)\n     `(lambda () ,expr))\n    ((and (pair? expr) (eq? (car expr) '+))\n     (let ((left (compile-expression (cadr expr)))\n           (right (compile-expression (caddr expr))))\n       `(lambda () (+ (,left) (,right)))))\n    ((and (pair? expr) (eq? (car expr) '*))\n     (let ((left (compile-expression (cadr expr)))\n           (right (compile-expression (caddr expr))))\n       `(lambda () (* (,left) (,right)))))\n    (else\n     (error &quot;Unknown expression&quot; expr))))\n\n;; 使用\n(define compiled (eval (compile-expression '(+ (* 2 3) 4))))\n(compiled)  ; → 10\n\n;; 练习5：协作式多任务\n(define (make-cooperative-scheduler)\n  (let ((tasks '())\n        (current-task #f))\n    \n    (define (add-task! name proc)\n      (set! tasks (append tasks (list (cons name proc)))))\n    \n    (define (yield-task)\n      (make-engine\n        (lambda ()\n          (if current-task\n              ((cdr current-task))\n              'no-task))))\n    \n    (define (run-scheduler time-slice)\n      (let loop ((remaining tasks))\n        (unless (null? remaining)\n          (set! current-task (car remaining))\n          (let ((engine (yield-task)))\n            (let ((result (engine time-slice #f)))\n              (if (procedure? result)\n                  ;; 任务未完成，重新调度\n                  (begin\n                    (set-cdr! current-task result)\n                    (loop (append (cdr remaining) (list current-task))))\n                  ;; 任务完成\n                  (begin\n                    (printf &quot;Task ~a completed: ~a~n&quot; \n                            (car current-task) result)\n                    (loop (cdr remaining)))))))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add) (add-task! (car args) (cadr args)))\n        ((run) (run-scheduler (if (null? args) 100 (car args))))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><hr>"},{"id":"16-performance","title":"第 16 章：性能优化","html":"<h1>第 16 章：性能优化</h1><p>性能对于生产环境的应用至关重要。本章介绍如何分析、测量和优化 Chez Scheme 程序的性能。</p><h2>性能测量</h2><h3>time 宏 - 基本计时</h3><div class=\"code-block\" id=\"code_qthue5yz9\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 基本用法\n(time (+ 1 2 3))\n; 输出类似：\n; (time (+ 1 2 3))\n;     no collections\n;     0ms elapsed cpu time\n;     0ms elapsed real time\n;     32 bytes allocated\n; 6\n\n;; 测量复杂操作\n(time\n  (let loop ((n 1000000) (sum 0))\n    (if (zero? n)\n        sum\n        (loop (- n 1) (+ sum n)))))\n\n;; 比较不同实现的性能\n(define (sum-recursive n)\n  (if (zero? n)\n      0\n      (+ n (sum-recursive (- n 1)))))\n\n(define (sum-iterative n)\n  (let loop ((i 0) (sum 0))\n    (if (= i n)\n        sum\n        (loop (+ i 1) (+ sum i)))))\n\n(define (sum-formula n)\n  (/ (* n (+ n 1)) 2))\n\n;; 性能对比\n(printf &quot;Recursive:~n&quot;)\n(time (sum-recursive 10000))\n\n(printf &quot;Iterative:~n&quot;)\n(time (sum-iterative 10000))\n\n(printf &quot;Formula:~n&quot;)\n(time (sum-formula 10000))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_qthue5yz9')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_qthue5yz9')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 基本用法\n(time (+ 1 2 3))\n; 输出类似：\n; (time (+ 1 2 3))\n;     no collections\n;     0ms elapsed cpu time\n;     0ms elapsed real time\n;     32 bytes allocated\n; 6\n\n;; 测量复杂操作\n(time\n  (let loop ((n 1000000) (sum 0))\n    (if (zero? n)\n        sum\n        (loop (- n 1) (+ sum n)))))\n\n;; 比较不同实现的性能\n(define (sum-recursive n)\n  (if (zero? n)\n      0\n      (+ n (sum-recursive (- n 1)))))\n\n(define (sum-iterative n)\n  (let loop ((i 0) (sum 0))\n    (if (= i n)\n        sum\n        (loop (+ i 1) (+ sum i)))))\n\n(define (sum-formula n)\n  (/ (* n (+ n 1)) 2))\n\n;; 性能对比\n(printf &quot;Recursive:~n&quot;)\n(time (sum-recursive 10000))\n\n(printf &quot;Iterative:~n&quot;)\n(time (sum-iterative 10000))\n\n(printf &quot;Formula:~n&quot;)\n(time (sum-formula 10000))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>详细的性能分析</h3><div class=\"code-block\" id=\"code_j6tahrw3g\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 获取详细统计信息\n(define (benchmark proc name . args)\n  (collect)  ; 清理内存\n  (let ((start-stats (statistics))\n        (start-time (current-time 'time-process)))\n    (let ((result (apply proc args)))\n      (let ((end-time (current-time 'time-process))\n            (end-stats (statistics)))\n        (printf &quot;~a:~n&quot; name)\n        (printf &quot;  Result: ~a~n&quot; result)\n        (printf &quot;  Time: ~a ms~n&quot; \n                (* 1000 (- end-time start-time)))\n        (printf &quot;  Bytes allocated: ~a~n&quot;\n                (- (sstats-bytes end-stats)\n                   (sstats-bytes start-stats)))\n        (printf &quot;  Collections: ~a~n&quot;\n                (- (sstats-gc-count end-stats)\n                   (sstats-gc-count start-stats)))\n        result))))\n\n;; 使用示例\n(benchmark sum-iterative &quot;Iterative Sum&quot; 100000)\n(benchmark sum-formula &quot;Formula Sum&quot; 100000)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_j6tahrw3g')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_j6tahrw3g')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 获取详细统计信息\n(define (benchmark proc name . args)\n  (collect)  ; 清理内存\n  (let ((start-stats (statistics))\n        (start-time (current-time 'time-process)))\n    (let ((result (apply proc args)))\n      (let ((end-time (current-time 'time-process))\n            (end-stats (statistics)))\n        (printf &quot;~a:~n&quot; name)\n        (printf &quot;  Result: ~a~n&quot; result)\n        (printf &quot;  Time: ~a ms~n&quot; \n                (* 1000 (- end-time start-time)))\n        (printf &quot;  Bytes allocated: ~a~n&quot;\n                (- (sstats-bytes end-stats)\n                   (sstats-bytes start-stats)))\n        (printf &quot;  Collections: ~a~n&quot;\n                (- (sstats-gc-count end-stats)\n                   (sstats-gc-count start-stats)))\n        result))))\n\n;; 使用示例\n(benchmark sum-iterative &quot;Iterative Sum&quot; 100000)\n(benchmark sum-formula &quot;Formula Sum&quot; 100000)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>重复测量和统计</h3><div class=\"code-block\" id=\"code_80umfluw7\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 多次运行取平均值\n(define (benchmark-average proc args runs)\n  (let ((times '())\n        (bytes-allocated '()))\n    (let loop ((i 0))\n      (when (&lt; i runs)\n        (collect)\n        (let ((start-stats (statistics))\n              (start-time (current-time 'time-process)))\n          (apply proc args)\n          (let ((end-time (current-time 'time-process))\n                (end-stats (statistics)))\n            (set! times (cons (- end-time start-time) times))\n            (set! bytes-allocated \n                  (cons (- (sstats-bytes end-stats)\n                           (sstats-bytes start-stats))\n                        bytes-allocated))))\n        (loop (+ i 1))))\n    \n    (let ((avg-time (/ (apply + times) runs))\n          (avg-bytes (/ (apply + bytes-allocated) runs)))\n      (printf &quot;Average over ~a runs:~n&quot; runs)\n      (printf &quot;  Time: ~a ms~n&quot; (* 1000 avg-time))\n      (printf &quot;  Bytes: ~a~n&quot; avg-bytes))))\n\n;; 测试不同的列表操作\n(benchmark-average \n  (lambda () (reverse (iota 10000)))\n  '() 10)\n\n(benchmark-average\n  (lambda () (map (lambda (x) (* x 2)) (iota 10000)))\n  '() 10)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_80umfluw7')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_80umfluw7')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 多次运行取平均值\n(define (benchmark-average proc args runs)\n  (let ((times '())\n        (bytes-allocated '()))\n    (let loop ((i 0))\n      (when (&lt; i runs)\n        (collect)\n        (let ((start-stats (statistics))\n              (start-time (current-time 'time-process)))\n          (apply proc args)\n          (let ((end-time (current-time 'time-process))\n                (end-stats (statistics)))\n            (set! times (cons (- end-time start-time) times))\n            (set! bytes-allocated \n                  (cons (- (sstats-bytes end-stats)\n                           (sstats-bytes start-stats))\n                        bytes-allocated))))\n        (loop (+ i 1))))\n    \n    (let ((avg-time (/ (apply + times) runs))\n          (avg-bytes (/ (apply + bytes-allocated) runs)))\n      (printf &quot;Average over ~a runs:~n&quot; runs)\n      (printf &quot;  Time: ~a ms~n&quot; (* 1000 avg-time))\n      (printf &quot;  Bytes: ~a~n&quot; avg-bytes))))\n\n;; 测试不同的列表操作\n(benchmark-average \n  (lambda () (reverse (iota 10000)))\n  '() 10)\n\n(benchmark-average\n  (lambda () (map (lambda (x) (* x 2)) (iota 10000)))\n  '() 10)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>追踪和分析</h2><h3>trace-output 详细追踪</h3><div class=\"code-block\" id=\"code_k8upu1bk6\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 启用详细追踪\n(trace-output-port (current-output-port))\n\n;; 追踪函数调用\n(define (fibonacci n)\n  (if (&lt;= n 1)\n      n\n      (+ (fibonacci (- n 1))\n         (fibonacci (- n 2)))))\n\n(trace fibonacci)\n(fibonacci 6)\n(untrace fibonacci)\n\n;; 条件追踪\n(define traced-counter 0)\n\n(define (trace-condition proc-name args)\n  (set! traced-counter (+ traced-counter 1))\n  (&lt; traced-counter 10))  ; 只追踪前10次调用\n\n;; 自定义追踪输出\n(define (custom-trace-handler name args result level)\n  (printf &quot;~a~a -&gt; ~a: ~a~n&quot;\n          (make-string level #\\space)\n          name args result))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_k8upu1bk6')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_k8upu1bk6')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 启用详细追踪\n(trace-output-port (current-output-port))\n\n;; 追踪函数调用\n(define (fibonacci n)\n  (if (&lt;= n 1)\n      n\n      (+ (fibonacci (- n 1))\n         (fibonacci (- n 2)))))\n\n(trace fibonacci)\n(fibonacci 6)\n(untrace fibonacci)\n\n;; 条件追踪\n(define traced-counter 0)\n\n(define (trace-condition proc-name args)\n  (set! traced-counter (+ traced-counter 1))\n  (&lt; traced-counter 10))  ; 只追踪前10次调用\n\n;; 自定义追踪输出\n(define (custom-trace-handler name args result level)\n  (printf &quot;~a~a -&gt; ~a: ~a~n&quot;\n          (make-string level #\\space)\n          name args result))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>内存分析</h3><div class=\"code-block\" id=\"code_du35u2fox\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 内存使用模式分析\n(define (analyze-memory-usage thunk name)\n  (collect)\n  (let ((before (statistics)))\n    (let ((result (thunk)))\n      (collect)\n      (let ((after (statistics)))\n        (printf &quot;~a memory analysis:~n&quot; name)\n        (printf &quot;  Bytes allocated: ~a~n&quot;\n                (- (sstats-bytes after) (sstats-bytes before)))\n        (printf &quot;  Collections triggered: ~a~n&quot;\n                (- (sstats-gc-count after) (sstats-gc-count before)))\n        (printf &quot;  Current heap size: ~a bytes~n&quot;\n                (sstats-current after))\n        result))))\n\n;; 内存泄露检测\n(define (detect-memory-leaks thunk iterations)\n  (let ((initial-memory (sstats-current (statistics))))\n    (let loop ((i 0) (measurements '()))\n      (if (= i iterations)\n          (let ((final-memory (sstats-current (statistics))))\n            (printf &quot;Initial memory: ~a bytes~n&quot; initial-memory)\n            (printf &quot;Final memory: ~a bytes~n&quot; final-memory)\n            (printf &quot;Memory growth: ~a bytes~n&quot; (- final-memory initial-memory))\n            (when (&gt; (- final-memory initial-memory) 1000000)\n              (printf &quot;WARNING: Possible memory leak detected!~n&quot;)))\n          (begin\n            (thunk)\n            (when (zero? (mod i 100))\n              (collect)\n              (let ((current (sstats-current (statistics))))\n                (set! measurements (cons current measurements))))\n            (loop (+ i 1) measurements))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_du35u2fox')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_du35u2fox')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 内存使用模式分析\n(define (analyze-memory-usage thunk name)\n  (collect)\n  (let ((before (statistics)))\n    (let ((result (thunk)))\n      (collect)\n      (let ((after (statistics)))\n        (printf &quot;~a memory analysis:~n&quot; name)\n        (printf &quot;  Bytes allocated: ~a~n&quot;\n                (- (sstats-bytes after) (sstats-bytes before)))\n        (printf &quot;  Collections triggered: ~a~n&quot;\n                (- (sstats-gc-count after) (sstats-gc-count before)))\n        (printf &quot;  Current heap size: ~a bytes~n&quot;\n                (sstats-current after))\n        result))))\n\n;; 内存泄露检测\n(define (detect-memory-leaks thunk iterations)\n  (let ((initial-memory (sstats-current (statistics))))\n    (let loop ((i 0) (measurements '()))\n      (if (= i iterations)\n          (let ((final-memory (sstats-current (statistics))))\n            (printf &quot;Initial memory: ~a bytes~n&quot; initial-memory)\n            (printf &quot;Final memory: ~a bytes~n&quot; final-memory)\n            (printf &quot;Memory growth: ~a bytes~n&quot; (- final-memory initial-memory))\n            (when (&gt; (- final-memory initial-memory) 1000000)\n              (printf &quot;WARNING: Possible memory leak detected!~n&quot;)))\n          (begin\n            (thunk)\n            (when (zero? (mod i 100))\n              (collect)\n              (let ((current (sstats-current (statistics))))\n                (set! measurements (cons current measurements))))\n            (loop (+ i 1) measurements))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>编译优化</h2><h3>optimize-level 设置</h3><div class=\"code-block\" id=\"code_yha3u1ls0\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 不同优化级别的比较\n(define test-data (iota 100000))\n\n(define (test-map-performance data)\n  (map (lambda (x) \n         (let ((y (* x x)))\n           (if (even? y) \n               (+ y 1) \n               (- y 1))))\n       data))\n\n;; 优化级别 0\n(optimize-level 0)\n(compile-file &quot;test.ss&quot; &quot;test-o0.so&quot;)\n(printf &quot;Level 0:~n&quot;)\n(time (load &quot;test-o0.so&quot;))\n\n;; 优化级别 3\n(optimize-level 3)\n(compile-file &quot;test.ss&quot; &quot;test-o3.so&quot;)\n(printf &quot;Level 3:~n&quot;)\n(time (load &quot;test-o3.so&quot;))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_yha3u1ls0')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_yha3u1ls0')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 不同优化级别的比较\n(define test-data (iota 100000))\n\n(define (test-map-performance data)\n  (map (lambda (x) \n         (let ((y (* x x)))\n           (if (even? y) \n               (+ y 1) \n               (- y 1))))\n       data))\n\n;; 优化级别 0\n(optimize-level 0)\n(compile-file &quot;test.ss&quot; &quot;test-o0.so&quot;)\n(printf &quot;Level 0:~n&quot;)\n(time (load &quot;test-o0.so&quot;))\n\n;; 优化级别 3\n(optimize-level 3)\n(compile-file &quot;test.ss&quot; &quot;test-o3.so&quot;)\n(printf &quot;Level 3:~n&quot;)\n(time (load &quot;test-o3.so&quot;))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>类型声明优化</h3><div class=\"code-block\" id=\"code_q7hj5neas\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 使用固定精度整数运算\n(define (fixnum-sum lst)\n  (declare (fixnum lst))\n  (let loop ((items lst) (sum 0))\n    (declare (fixnum sum))\n    (if (null? items)\n        sum\n        (loop (cdr items) \n              (fx+ sum (car items))))))\n\n;; 浮点数优化\n(define (flonum-operations x y z)\n  (declare (flonum x y z))\n  (fl+ (fl* x y) (fl/ y z)))\n\n;; 向量优化\n(define (fast-vector-sum vec)\n  (declare (vector vec))\n  (let ((len (vector-length vec)))\n    (let loop ((i 0) (sum 0))\n      (if (fx= i len)\n          sum\n          (loop (fx+ i 1) \n                (+ sum (vector-ref vec i)))))))\n\n;; 性能对比\n(define big-vector (vector-map (lambda (x) (random 1000)) (make-vector 100000)))\n\n(printf &quot;Generic vector sum:~n&quot;)\n(time (let loop ((i 0) (sum 0))\n        (if (= i (vector-length big-vector))\n            sum\n            (loop (+ i 1) (+ sum (vector-ref big-vector i))))))\n\n(printf &quot;Optimized vector sum:~n&quot;)\n(time (fast-vector-sum big-vector))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_q7hj5neas')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_q7hj5neas')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 使用固定精度整数运算\n(define (fixnum-sum lst)\n  (declare (fixnum lst))\n  (let loop ((items lst) (sum 0))\n    (declare (fixnum sum))\n    (if (null? items)\n        sum\n        (loop (cdr items) \n              (fx+ sum (car items))))))\n\n;; 浮点数优化\n(define (flonum-operations x y z)\n  (declare (flonum x y z))\n  (fl+ (fl* x y) (fl/ y z)))\n\n;; 向量优化\n(define (fast-vector-sum vec)\n  (declare (vector vec))\n  (let ((len (vector-length vec)))\n    (let loop ((i 0) (sum 0))\n      (if (fx= i len)\n          sum\n          (loop (fx+ i 1) \n                (+ sum (vector-ref vec i)))))))\n\n;; 性能对比\n(define big-vector (vector-map (lambda (x) (random 1000)) (make-vector 100000)))\n\n(printf &quot;Generic vector sum:~n&quot;)\n(time (let loop ((i 0) (sum 0))\n        (if (= i (vector-length big-vector))\n            sum\n            (loop (+ i 1) (+ sum (vector-ref big-vector i))))))\n\n(printf &quot;Optimized vector sum:~n&quot;)\n(time (fast-vector-sum big-vector))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>算法优化</h2><h3>尾递归优化</h3><div class=\"code-block\" id=\"code_ttw526yfu\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 非尾递归版本（慢，可能栈溢出）\n(define (factorial-slow n)\n  (if (&lt;= n 1)\n      1\n      (* n (factorial-slow (- n 1)))))\n\n;; 尾递归版本（快，不会栈溢出）\n(define (factorial-fast n)\n  (let loop ((n n) (acc 1))\n    (if (&lt;= n 1)\n        acc\n        (loop (- n 1) (* n acc)))))\n\n;; 比较性能\n(benchmark factorial-slow &quot;Non-tail recursive&quot; 10000)\n(benchmark factorial-fast &quot;Tail recursive&quot; 10000)\n\n;; 累加器传递风格\n(define (reverse-slow lst)\n  (if (null? lst)\n      '()\n      (append (reverse-slow (cdr lst)) (list (car lst)))))\n\n(define (reverse-fast lst)\n  (let loop ((remaining lst) (result '()))\n    (if (null? remaining)\n        result\n        (loop (cdr remaining) (cons (car remaining) result)))))\n\n;; 测试大列表\n(define big-list (iota 10000))\n(benchmark reverse-slow &quot;Slow reverse&quot; big-list)\n(benchmark reverse-fast &quot;Fast reverse&quot; big-list)</code></pre><div class=\"code-action (printf &quot;Association list lookup:~n&quot;)\n(time\n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (assoc (random 1000) test-alist)\n      (loop (+ i 1)))))\n\n(printf &quot;Hash table lookup:~n&quot;)\n(time\n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (hashtable-ref test-hashtable (random 1000) #f)\n      (loop (+ i 1)))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_vd4uts18t')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_vd4uts18t')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 列表 vs 向量 - 随机访问\n(define test-list (iota 10000))\n(define test-vector (list-&gt;vector test-list))\n\n(printf &quot;List random access:~n&quot;)\n(time \n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (list-ref test-list (random 10000))\n      (loop (+ i 1)))))\n\n(printf &quot;Vector random access:~n&quot;)\n(time\n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (vector-ref test-vector (random 10000))\n      (loop (+ i 1)))))\n\n;; 关联列表 vs 哈希表 - 查找\n(define test-alist (map (lambda (i) (cons i (* i i))) (iota 1000)))\n(define test-hashtable (make-hashtable = =))\n(for-each (lambda (pair) \n            (hashtable-set! test-hashtable (car pair) (cdr pair)))\n          test-alist)\n\n(printf &quot;Association list lookup:~n&quot;)\n(time\n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (assoc (random 1000) test-alist)\n      (loop (+ i 1)))))\n\n(printf &quot;Hash table lookup:~n&quot;)\n(time\n  (let loop ((i 0))\n    (when (&lt; i 1000)\n      (hashtable-ref test-hashtable (random 1000) #f)\n      (loop (+ i 1)))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>内存优化</h2><h3>避免不必要的分配</h3><div class=\"code-block\" id=\"code_a1x6ovlky\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 低效版本：创建很多临时列表\n(define (process-list-slow lst)\n  (map (lambda (x) (* x 2))\n       (filter even?\n               (map (lambda (x) (+ x 1)) lst))))\n\n;; 高效版本：单次遍历\n(define (process-list-fast lst)\n  (let loop ((items lst) (result '()))\n    (if (null? items)\n        (reverse result)\n        (let ((item (car items)))\n          (let ((incremented (+ item 1)))\n            (if (even? incremented)\n                (loop (cdr items) (cons (* incremented 2) result))\n                (loop (cdr items) result)))))))\n\n;; 原地修改版本（如果可能）\n(define (process-vector-inplace! vec)\n  (let ((len (vector-length vec)))\n    (let loop ((i 0) (write-pos 0))\n      (if (= i len)\n          write-pos  ; 返回新的有效长度\n          (let ((item (vector-ref vec i)))\n            (let ((incremented (+ item 1)))\n              (if (even? incremented)\n                  (begin\n                    (vector-set! vec write-pos (* incremented 2))\n                    (loop (+ i 1) (+ write-pos 1)))\n                  (loop (+ i 1) write-pos))))))))\n\n;; 测试内存使用\n(define big-list (iota 50000))\n(analyze-memory-usage \n  (lambda () (process-list-slow big-list)) \n  &quot;Slow version&quot;)\n(analyze-memory-usage \n  (lambda () (process-list-fast big-list)) \n  &quot;Fast version&quot;)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_a1x6ovlky')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_a1x6ovlky')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 低效版本：创建很多临时列表\n(define (process-list-slow lst)\n  (map (lambda (x) (* x 2))\n       (filter even?\n               (map (lambda (x) (+ x 1)) lst))))\n\n;; 高效版本：单次遍历\n(define (process-list-fast lst)\n  (let loop ((items lst) (result '()))\n    (if (null? items)\n        (reverse result)\n        (let ((item (car items)))\n          (let ((incremented (+ item 1)))\n            (if (even? incremented)\n                (loop (cdr items) (cons (* incremented 2) result))\n                (loop (cdr items) result)))))))\n\n;; 原地修改版本（如果可能）\n(define (process-vector-inplace! vec)\n  (let ((len (vector-length vec)))\n    (let loop ((i 0) (write-pos 0))\n      (if (= i len)\n          write-pos  ; 返回新的有效长度\n          (let ((item (vector-ref vec i)))\n            (let ((incremented (+ item 1)))\n              (if (even? incremented)\n                  (begin\n                    (vector-set! vec write-pos (* incremented 2))\n                    (loop (+ i 1) (+ write-pos 1)))\n                  (loop (+ i 1) write-pos))))))))\n\n;; 测试内存使用\n(define big-list (iota 50000))\n(analyze-memory-usage \n  (lambda () (process-list-slow big-list)) \n  &quot;Slow version&quot;)\n(analyze-memory-usage \n  (lambda () (process-list-fast big-list)) \n  &quot;Fast version&quot;)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h3>惰性求值优化</h3><div class=\"code-block\" id=\"code_hsod2qb4y\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 立即求值版本\n(define (generate-and-filter n predicate)\n  (filter predicate (iota n)))\n\n;; 惰性版本（生成器风格）\n(define (lazy-filter-generator n predicate)\n  (let ((current 0))\n    (lambda ()\n      (let loop ()\n        (cond\n          ((&gt;= current n) 'done)\n          ((predicate current)\n           (let ((result current))\n             (set! current (+ current 1))\n             result))\n          (else\n           (set! current (+ current 1))\n           (loop)))))))\n\n;; 测试 - 只需要前几个结果\n(printf &quot;Eager evaluation:~n&quot;)\n(time\n  (let ((results (generate-and-filter 1000000 \n                                      (lambda (x) (= (mod x 1000) 0)))))\n    (take results 10)))\n\n(printf &quot;Lazy evaluation:~n&quot;)\n(time\n  (let ((gen (lazy-filter-generator 1000000 \n                                    (lambda (x) (= (mod x 1000) 0))))\n        (results '()))\n    (let loop ((count 0))\n      (if (= count 10)\n          (reverse results)\n          (let ((next (gen)))\n            (if (eq? next 'done)\n                (reverse results)\n                (begin\n                  (set! results (cons next results))\n                  (loop (+ count 1)))))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_hsod2qb4y')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_hsod2qb4y')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 立即求值版本\n(define (generate-and-filter n predicate)\n  (filter predicate (iota n)))\n\n;; 惰性版本（生成器风格）\n(define (lazy-filter-generator n predicate)\n  (let ((current 0))\n    (lambda ()\n      (let loop ()\n        (cond\n          ((&gt;= current n) 'done)\n          ((predicate current)\n           (let ((result current))\n             (set! current (+ current 1))\n             result))\n          (else\n           (set! current (+ current 1))\n           (loop)))))))\n\n;; 测试 - 只需要前几个结果\n(printf &quot;Eager evaluation:~n&quot;)\n(time\n  (let ((results (generate-and-filter 1000000 \n                                      (lambda (x) (= (mod x 1000) 0)))))\n    (take results 10)))\n\n(printf &quot;Lazy evaluation:~n&quot;)\n(time\n  (let ((gen (lazy-filter-generator 1000000 \n                                    (lambda (x) (= (mod x 1000) 0))))\n        (results '()))\n    (let loop ((count 0))\n      (if (= count 10)\n          (reverse results)\n          (let ((next (gen)))\n            (if (eq? next 'done)\n                (reverse results)\n                (begin\n                  (set! results (cons next results))\n                  (loop (+ count 1)))))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>并行化</h2><h3>简单并行映射</h3><div class=\"code-block\" id=\"code_uvrra8c14\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 并行映射实现\n(define (parallel-map proc lst num-threads)\n  (let ((chunk-size (ceiling (/ (length lst) num-threads)))\n        (results (make-vector num-threads))\n        (threads '()))\n    \n    ;; 创建线程处理各个块\n    (let loop ((i 0) (remaining lst))\n      (when (and (&lt; i num-threads) (not (null? remaining)))\n        (let ((chunk (take remaining (min chunk-size (length remaining)))))\n          (let ((thread \n                  (fork-thread\n                    (lambda ()\n                      (vector-set! results i (map proc chunk))))))\n            (set! threads (cons thread threads)))\n          (loop (+ i 1) (drop remaining (length chunk))))))\n    \n    ;; 等待所有线程完成\n    (for-each thread-join threads)\n    \n    ;; 合并结果\n    (apply append (vector-&gt;list results))))\n\n;; 性能对比\n(define big-list (iota 100000))\n(define (expensive-computation x)\n  (let loop ((i 0) (result x))\n    (if (= i 100)\n        result\n        (loop (+ i 1) (sqrt (+ result i))))))\n\n(printf &quot;Sequential map:~n&quot;)\n(time (map expensive-computation (take big-list 1000)))\n\n(printf &quot;Parallel map (4 threads):~n&quot;)\n(time (parallel-map expensive-computation (take big-list 1000) 4))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_uvrra8c14')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_uvrra8c14')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 并行映射实现\n(define (parallel-map proc lst num-threads)\n  (let ((chunk-size (ceiling (/ (length lst) num-threads)))\n        (results (make-vector num-threads))\n        (threads '()))\n    \n    ;; 创建线程处理各个块\n    (let loop ((i 0) (remaining lst))\n      (when (and (&lt; i num-threads) (not (null? remaining)))\n        (let ((chunk (take remaining (min chunk-size (length remaining)))))\n          (let ((thread \n                  (fork-thread\n                    (lambda ()\n                      (vector-set! results i (map proc chunk))))))\n            (set! threads (cons thread threads)))\n          (loop (+ i 1) (drop remaining (length chunk))))))\n    \n    ;; 等待所有线程完成\n    (for-each thread-join threads)\n    \n    ;; 合并结果\n    (apply append (vector-&gt;list results))))\n\n;; 性能对比\n(define big-list (iota 100000))\n(define (expensive-computation x)\n  (let loop ((i 0) (result x))\n    (if (= i 100)\n        result\n        (loop (+ i 1) (sqrt (+ result i))))))\n\n(printf &quot;Sequential map:~n&quot;)\n(time (map expensive-computation (take big-list 1000)))\n\n(printf &quot;Parallel map (4 threads):~n&quot;)\n(time (parallel-map expensive-computation (take big-list 1000) 4))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>练习</h2><h3>练习1：性能监视器</h3><p>创建一个性能监视器，跟踪程序运行时的内存和CPU使用情况。</p><h3>练习2：缓存系统</h3><p>实现一个带过期时间和LRU淘汰的高性能缓存。</p><h3>练习3：算法比较</h3><p>比较不同排序算法在不同数据规模下的性能。</p><h3>练习4：内存池</h3><p>实现一个对象池来减少垃圾回收压力。</p><h3>练习5：批处理优化</h3><p>优化文件处理，使用批处理减少I/O操作。</p><h2>参考答案</h2><div class=\"code-block\" id=\"code_k6bdb59e3\"><pre class=\"code-display\"><code class=\"language-scheme\">;; 练习1：性能监视器\n(define (make-performance-monitor interval-ms)\n  (let ((monitoring #t)\n        (measurements '()))\n    \n    (define (monitor-thread)\n      (let loop ()\n        (when monitoring\n          (let ((stats (statistics)))\n            (set! measurements \n                  (cons (list (current-time 'time-utc)\n                              (sstats-bytes stats)\n                              (sstats-cpu stats))\n                        measurements)))\n          (sleep (make-time 'time-duration (* interval-ms 1000000) 0))\n          (loop))))\n    \n    (define monitor-thread-handle (fork-thread monitor-thread))\n    \n    (lambda (operation . args)\n      (case operation\n        ((stop)\n         (set! monitoring #f)\n         (thread-join monitor-thread-handle))\n        ((report)\n         (printf &quot;Performance Report:~n&quot;)\n         (for-each (lambda (measurement)\n                     (printf &quot;Time: ~a, Bytes: ~a, CPU: ~a~n&quot;\n                             (car measurement)\n                             (cadr measurement)\n                             (caddr measurement)))\n                   (reverse measurements)))\n        ((reset)\n         (set! measurements '()))))))\n\n;; 练习3：排序算法比较\n(define (bubble-sort! vec)\n  (let ((n (vector-length vec)))\n    (let outer-loop ((i 0))\n      (when (&lt; i (- n 1))\n        (let inner-loop ((j 0))\n          (when (&lt; j (- n i 1))\n            (when (&gt; (vector-ref vec j) (vector-ref vec (+ j 1)))\n              (let ((temp (vector-ref vec j)))\n                (vector-set! vec j (vector-ref vec (+ j 1)))\n                (vector-set! vec (+ j 1) temp)))\n            (inner-loop (+ j 1))))\n        (outer-loop (+ i 1))))))\n\n(define (quick-sort! vec start end)\n  (when (&lt; start end)\n    (let ((pivot (partition! vec start end)))\n      (quick-sort! vec start (- pivot 1))\n      (quick-sort! vec (+ pivot 1) end))))\n\n(define (partition! vec start end)\n  (let ((pivot-value (vector-ref vec end))\n        (i start))\n    (let loop ((j start))\n      (if (&lt; j end)\n          (begin\n            (when (&lt;= (vector-ref vec j) pivot-value)\n              (let ((temp (vector-ref vec i)))\n                (vector-set! vec i (vector-ref vec j))\n                (vector-set! vec j temp))\n              (set! i (+ i 1)))\n            (loop (+ j 1)))\n          (begin\n            (let ((temp (vector-ref vec i)))\n              (vector-set! vec i (vector-ref vec end))\n              (vector-set! vec end temp))\n            i)))))\n\n(define (compare-sorting-algorithms sizes)\n  (for-each (lambda (size)\n              (printf &quot;~nTesting with ~a elements:~n&quot; size)\n              (let ((test-data (vector-map (lambda (x) (random 10000)) \n                                           (make-vector size))))\n                \n                ;; 测试冒泡排序\n                (let ((bubble-data (vector-copy test-data)))\n                  (printf &quot;Bubble sort: &quot;)\n                  (time (bubble-sort! bubble-data)))\n                \n                ;; 测试快速排序\n                (let ((quick-data (vector-copy test-data)))\n                  (printf &quot;Quick sort: &quot;)\n                  (time (quick-sort! quick-data 0 (- size 1))))\n                \n                ;; 测试内置排序\n                (let ((builtin-data (vector-copy test-data)))\n                  (printf &quot;Built-in sort: &quot;)\n                  (time (vector-sort! &lt; builtin-data)))))\n            sizes))\n\n;; 练习4：对象池\n(define (make-object-pool factory reset-proc initial-size max-size)\n  (let ((available '())\n        (in-use (make-hashtable eq-hash eq?))\n        (mutex (make-mutex)))\n    \n    ;; 预填充池\n    (let loop ((i 0))\n      (when (&lt; i initial-size)\n        (set! available (cons (factory) available))\n        (loop (+ i 1))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((get)\n         (with-mutex mutex\n           (cond\n             ((not (null? available))\n              (let ((obj (car available)))\n                (set! available (cdr available))\n                (hashtable-set! in-use obj #t)\n                obj))\n             ((&lt; (+ (length available) (hashtable-size in-use)) max-size)\n              (let ((obj (factory)))\n                (hashtable-set! in-use obj #t)\n                obj))\n             (else #f))))  ; 池已满\n        \n        ((return)\n         (let ((obj (car args)))\n           (with-mutex mutex\n             (when (hashtable-contains? in-use obj)\n               (hashtable-delete! in-use obj)\n               (reset-proc obj)\n               (set! available (cons obj available))))))\n        \n        ((stats)\n         (printf &quot;Pool stats: Available: ~a, In use: ~a~n&quot;\n                 (length available)\n                 (hashtable-size in-use)))))))\n\n;; 练习5：批处理文件操作\n(define (batch-file-processor batch-size)\n  (let ((buffer '())\n        (buffer-size 0))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add)\n         (let ((item (car args)))\n           (set! buffer (cons item buffer))\n           (set! buffer-size (+ buffer-size 1))\n           (when (&gt;= buffer-size batch-size)\n             (process-batch (reverse buffer))\n             (set! buffer '())\n             (set! buffer-size 0))))\n        \n        ((flush)\n         (when (&gt; buffer-size 0)\n           (process-batch (reverse buffer))\n           (set! buffer '())\n           (set! buffer-size 0)))))))\n\n(define (process-batch items)\n  (printf &quot;Processing batch of ~a items~n&quot; (length items))\n  ;; 实际的批处理逻辑\n  (for-each (lambda (item)\n              ;; 处理每个项目\n              (printf &quot;  Processing: ~a~n&quot; item))\n            items))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_k6bdb59e3')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_k6bdb59e3')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">;; 练习1：性能监视器\n(define (make-performance-monitor interval-ms)\n  (let ((monitoring #t)\n        (measurements '()))\n    \n    (define (monitor-thread)\n      (let loop ()\n        (when monitoring\n          (let ((stats (statistics)))\n            (set! measurements \n                  (cons (list (current-time 'time-utc)\n                              (sstats-bytes stats)\n                              (sstats-cpu stats))\n                        measurements)))\n          (sleep (make-time 'time-duration (* interval-ms 1000000) 0))\n          (loop))))\n    \n    (define monitor-thread-handle (fork-thread monitor-thread))\n    \n    (lambda (operation . args)\n      (case operation\n        ((stop)\n         (set! monitoring #f)\n         (thread-join monitor-thread-handle))\n        ((report)\n         (printf &quot;Performance Report:~n&quot;)\n         (for-each (lambda (measurement)\n                     (printf &quot;Time: ~a, Bytes: ~a, CPU: ~a~n&quot;\n                             (car measurement)\n                             (cadr measurement)\n                             (caddr measurement)))\n                   (reverse measureme                (printf &quot;Quick sort: &quot;)\n                  (time (quick-sort! quick-data 0 (- size 1))))\n                \n                ;; 测试内置排序\n                (let ((builtin-data (vector-copy test-data)))\n                  (printf &quot;Built-in sort: &quot;)\n                  (time (vector-sort! &lt; builtin-data)))))\n            sizes))\n\n;; 练习4：对象池\n(define (make-object-pool factory reset-proc initial-size max-size)\n  (let ((available '())\n        (in-use (make-hashtable eq-hash eq?))\n        (mutex (make-mutex)))\n    \n    ;; 预填充池\n    (let loop ((i 0))\n      (when (&lt; i initial-size)\n        (set! available (cons (factory) available))\n        (loop (+ i 1))))\n    \n    (lambda (operation . args)\n      (case operation\n        ((get)\n         (with-mutex mutex\n           (cond\n             ((not (null? available))\n              (let ((obj (car available)))\n                (set! available (cdr available))\n                (hashtable-set! in-use obj #t)\n                obj))\n             ((&lt; (+ (length available) (hashtable-size in-use)) max-size)\n              (let ((obj (factory)))\n                (hashtable-set! in-use obj #t)\n                obj))\n             (else #f))))  ; 池已满\n        \n        ((return)\n         (let ((obj (car args)))\n           (with-mutex mutex\n             (when (hashtable-contains? in-use obj)\n               (hashtable-delete! in-use obj)\n               (reset-proc obj)\n               (set! available (cons obj available))))))\n        \n        ((stats)\n         (printf &quot;Pool stats: Available: ~a, In use: ~a~n&quot;\n                 (length available)\n                 (hashtable-size in-use)))))))\n\n;; 练习5：批处理文件操作\n(define (batch-file-processor batch-size)\n  (let ((buffer '())\n        (buffer-size 0))\n    \n    (lambda (operation . args)\n      (case operation\n        ((add)\n         (let ((item (car args)))\n           (set! buffer (cons item buffer))\n           (set! buffer-size (+ buffer-size 1))\n           (when (&gt;= buffer-size batch-size)\n             (process-batch (reverse buffer))\n             (set! buffer '())\n             (set! buffer-size 0))))\n        \n        ((flush)\n         (when (&gt; buffer-size 0)\n           (process-batch (reverse buffer))\n           (set! buffer '())\n           (set! buffer-size 0)))))))\n\n(define (process-batch items)\n  (printf &quot;Processing batch of ~a items~n&quot; (length items))\n  ;; 实际的批处理逻辑\n  (for-each (lambda (item)\n              ;; 处理每个项目\n              (printf &quot;  Processing: ~a~n&quot; item))\n            items))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><hr>"},{"id":"17-practical","title":"第 17 章：实践项目 - 键值存储系统","html":"<h1>第 17 章：实践项目 - 键值存储系统</h1><p>让我们构建一个完整的键值存储系统，集成前面学到的所有概念：数据结构、I/O、模块、错误处理、并发等。</p><h2>项目概述</h2><p>我们将实现：</p><ul><li>内存中的键值存储</li><li>持久化到文件</li><li>简单的事务支持</li><li>REPL 交互界面</li><li>网络接口</li><li>性能监控</li></ul><h2>第一步：核心数据结构</h2><p>创建 <code>kv-store.sls</code>：</p><div class=\"code-block\" id=\"code_z1crw6lvm\"><pre class=\"code-display\"><code class=\"language-scheme\">(library (kv-store)\n  (export make-kv-store\n          kv-get kv-put! kv-delete! kv-exists? kv-keys kv-clear!\n          kv-size kv-save! kv-load! kv-stats\n          kv-transaction kv-commit! kv-rollback!)\n  (import (rnrs)\n          (chezscheme))\n\n  ;; 存储记录定义\n  (define-record-type kv-store\n    (make-kv-store-internal data transactions stats mutex)\n    kv-store?\n    (data kv-store-data set-kv-store-data!)\n    (transactions kv-store-transactions set-kv-store-transactions!)\n    (stats kv-store-stats set-kv-store-stats!)\n    (mutex kv-store-mutex))\n\n  ;; 统计信息记录\n  (define-record-type kv-stats\n    (make-kv-stats gets puts deletes hits misses)\n    kv-stats?\n    (gets kv-stats-gets set-kv-stats-gets!)\n    (puts kv-stats-puts set-kv-stats-puts!)\n    (deletes kv-stats-deletes set-kv-stats-deletes!)\n    (hits kv-stats-hits set-kv-stats-hits!)\n    (misses kv-stats-misses set-kv-stats-misses!))\n\n  ;; 事务记录\n  (define-record-type kv-transaction\n    (make-kv-transaction id operations snapshot)\n    kv-transaction?\n    (id kv-transaction-id)\n    (operations kv-transaction-operations set-kv-transaction-operations!)\n    (snapshot kv-transaction-snapshot))\n\n  ;; 创建新的键值存储\n  (define (make-kv-store)\n    (make-kv-store-internal\n      (make-hashtable string-hash string=?)  ; 数据存储\n      '()                                    ; 活跃事务\n      (make-kv-stats 0 0 0 0 0)             ; 统计信息\n      (make-mutex)))                        ; 并发控制\n\n  ;; 获取值\n  (define (kv-get store key)\n    (with-mutex (kv-store-mutex store)\n      (let ((stats (kv-store-stats store)))\n        (set-kv-stats-gets! stats (+ (kv-stats-gets stats) 1))\n        (let ((result (hashtable-ref (kv-store-data store) key #f)))\n          (if result\n              (set-kv-stats-hits! stats (+ (kv-stats-hits stats) 1))\n              (set-kv-stats-misses! stats (+ (kv-stats-misses stats) 1)))\n          result))))\n\n  ;; 存储值\n  (define (kv-put! store key value)\n    (with-mutex (kv-store-mutex store)\n      (let ((stats (kv-store-stats store)))\n        (set-kv-stats-puts! stats (+ (kv-stats-puts stats) 1)))\n      (hashtable-set! (kv-store-data store) key value)))\n\n  ;; 删除键\n  (define (kv-delete! store key)\n    (with-mutex (kv-store-mutex store)\n      (let ((stats (kv-store-stats store)))\n        (set-kv-stats-deletes! stats (+ (kv-stats-deletes stats) 1)))\n      (hashtable-delete! (kv-store-data store) key)))\n\n  ;; 检查键是否存在\n  (define (kv-exists? store key)\n    (hashtable-contains? (kv-store-data store) key))\n\n  ;; 获取所有键\n  (define (kv-keys store)\n    (vector-&gt;list (hashtable-keys (kv-store-data store))))\n\n  ;; 清空存储\n  (define (kv-clear! store)\n    (with-mutex (kv-store-mutex store)\n      (hashtable-clear! (kv-store-data store))))\n\n  ;; 获取存储大小\n  (define (kv-size store)\n    (hashtable-size (kv-store-data store)))\n\n  ;; 获取统计信息\n  (define (kv-stats store)\n    (let ((stats (kv-store-stats store)))\n      `((gets . ,(kv-stats-gets stats))\n        (puts . ,(kv-stats-puts stats))\n        (deletes . ,(kv-stats-deletes stats))\n        (hits . ,(kv-stats-hits stats))\n        (misses . ,(kv-stats-misses stats))\n        (hit-ratio . ,(if (&gt; (kv-stats-gets stats) 0)\n                          (/ (kv-stats-hits stats) (kv-stats-gets stats))\n                          0))\n        (size . ,(kv-size store)))))\n\n  ;; 开始事务\n  (define (kv-transaction store)\n    (with-mutex (kv-store-mutex store)\n      (let* ((tx-id (gensym 'transaction))\n             (snapshot (hashtable-copy (kv-store-data store) #f))\n             (tx (make-kv-transaction tx-id '() snapshot)))\n        (set-kv-store-transactions! store \n                                    (cons tx (kv-store-transactions store)))\n        tx-id)))\n\n  ;; 提交事务\n  (define (kv-commit! store tx-id)\n    (with-mutex (kv-store-mutex store)\n      (let ((tx (find (lambda (t) (eq? (kv-transaction-id t) tx-id))\n                      (kv-store-transactions store))))\n        (when tx\n          ;; 事务已经在进行中应用了操作，所以只需要清理\n          (set-kv-store-transactions! \n            store\n            (remove tx (kv-store-transactions store)))\n          #t))))\n\n  ;; 回滚事务  \n  (define (kv-rollback! store tx-id)\n    (with-mutex (kv-store-mutex store)\n      (let ((tx (find (lambda (t) (eq? (kv-transaction-id t) tx-id))\n                      (kv-store-transactions store))))\n        (when tx\n          ;; 恢复快照\n          (set-kv-store-data! store (kv-transaction-snapshot tx))\n          (set-kv-store-transactions!\n            store\n            (remove tx (kv-store-transactions store)))\n          #t))))\n\n  ;; 持久化到文件\n  (define (kv-save! store filename)\n    (with-mutex (kv-store-mutex store)\n      (call-with-output-file filename\n        (lambda (port)\n          (let-values (((keys values) (hashtable-entries (kv-store-data store))))\n            (let ((len (vector-length keys)))\n              (fprintf port &quot;~s~n&quot; len)  ; 写入条目数量\n              (let loop ((i 0))\n                (when (&lt; i len)\n                  (fprintf port &quot;~s ~s~n&quot; \n                          (vector-ref keys i) \n                          (vector-ref values i))\n                  (loop (+ i 1)))))))\n        'replace)))\n\n  ;; 从文件加载\n  (define (kv-load! store filename)\n    (when (file-exists? filename)\n      (with-mutex (kv-store-mutex store)\n        (hashtable-clear! (kv-store-data store))\n        (call-with-input-file filename\n          (lambda (port)\n            (let ((count (read port)))\n              (let loop ((i 0))\n                (when (&lt; i count)\n                  (let ((key (read port))\n                        (value (read port)))\n                    (hashtable-set! (kv-store-data store) key value))\n                  (loop (+ i 1))))))))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_z1crw6lvm')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_z1crw6lvm')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">(library (kv-store)\n  (export make-kv-store\n          kv-get kv-put! kv-delete! kv-exists? kv-keys kv-clear!\n          kv-size kv-save! kv-load! kv-stats\n          kv-transaction kv-commit! kv-rollback!)\n  (import (rnrs)\n          (chezscheme))\n\n  ;; 存储记录定义\n  (define-record-type kv-store\n    (make-kv-store-internal data transactions stats mutex)\n    kv-store?\n    (data kv-store-data set-kv-store-data!)\n    (transactions kv-store-transactions set-kv-store-transactions!)\n    (stats kv-store-stats set-kv-store-stats!)\n    (mutex kv-store-mutex))\n\n  ;; 统计信息记录\n  (define-record-type kv-stats\n    (make-kv-stats gets puts deletes hits misses)\n    kv-stats?\n    (gets kv-stats-gets set-kv-stats-gets!)\n    (puts kv-stats-puts set-kv-stats-puts!)\n    (deletes kv-stats-del ine (kv-size store)\n    (hashtable-size (kv-store-data store)))\n\n  ;; 获取统计信息\n  (define (kv-stats store)\n    (let ((stats (kv-store-stats store)))\n      `((gets . ,(kv-stats-gets stats))\n        (puts . ,(kv-stats-puts stats))\n        (deletes . ,(kv-stats-deletes stats))\n        (hits . ,(kv-stats-hits stats))\n        (misses . ,(kv-stats-misses stats))\n        (hit-ratio . ,(if (&gt; (kv-stats-gets stats) 0)\n                          (/ (kv-stats-hits stats) (kv-stats-gets stats))\n                          0))\n        (size . ,(kv-size store)))))\n\n  ;; 开始事务\n  (define (kv-transaction store)\n    (with-mutex (kv-store-mutex store)\n      (let* ((tx-id (gensym 'transaction))\n             (snapshot (hashtable-copy (kv-store-data store) #f))\n             (tx (make-kv-transaction tx-id '() snapshot)))\n        (set-kv-store-transactions! store \n                                    (cons tx (kv-store-transactions store)))\n        tx-id)))\n\n  ;; 提交事务\n  (define (kv-commit! store tx-id)\n    (with-mutex (kv-store-mutex store)\n      (let ((tx (find (lambda (t) (eq? (kv-transaction-id t) tx-id))\n                      (kv-store-transactions store))))\n        (when tx\n          ;; 事务已经在进行中应用了操作，所以只需要清理\n          (set-kv-store-transactions! \n            store\n            (remove tx (kv-store-transactions store)))\n          #t))))\n\n  ;; 回滚事务  \n  (define (kv-rollback! store tx-id)\n    (with-mutex (kv-store-mutex store)\n      (let ((tx (find (lambda (t) (eq? (kv-transaction-id t) tx-id))\n                      (kv-store-transactions store))))\n        (when tx\n          ;; 恢复快照\n          (set-kv-store-data! store (kv-transaction-snapshot tx))\n          (set-kv-store-transactions!\n            store\n            (remove tx (kv-store-transactions store)))\n          #t))))\n\n  ;; 持久化到文件\n  (define (kv-save! store filename)\n    (with-mutex (kv-store-mutex store)\n      (call-with-output-file filename\n        (lambda (port)\n          (let-values (((keys values) (hashtable-entries (kv-store-data store))))\n            (let ((len (vector-length keys)))\n              (fprintf port &quot;~s~n&quot; len)  ; 写入条目数量\n              (let loop ((i 0))\n                (when (&lt; i len)\n                  (fprintf port &quot;~s ~s~n&quot; \n                          (vector-ref keys i) \n                          (vector-ref values i))\n                  (loop (+ i 1)))))))\n        'replace)))\n\n  ;; 从文件加载\n  (define (kv-load! store filename)\n    (when (file-exists? filename)\n      (with-mutex (kv-store-mutex store)\n        (hashtable-clear! (kv-store-data store))\n        (call-with-input-file filename\n          (lambda (port)\n            (let ((count (read port)))\n              (let loop ((i 0))\n                (when (&lt; i count)\n                  (let ((key (read port))\n                        (value (read port)))\n                    (hashtable-set! (kv-store-data store) key value))\n                  (loop (+ i 1))))))))))</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>第二步：命令解析器</h2><p>创建 <code>kv-parser.sls</code>：</p><div class=\"code-block\" id=\"code_gidlf5uyc\"><pre class=\"code-display\"><code class=\"language-scheme\">(library (kv-parser)\n  (export parse-command execute-command)\n  (import (rnrs)\n          (kv-store)\n          (chezscheme))\n\n  ;; 命令类型\n  (define-record-type command\n    (make-command type args)\n    command?\n    (type command-type)\n    (args command-args))\n\n  ;; 解析命令字符串\n  (define (parse-command input)\n    (guard (ex (else (make-command 'error (list &quot;Parse error&quot; ex))))\n      (let ((tokens (string-split input #\\space)))\n        (if (null? tokens)\n            (make-command 'empty '())\n            (let ((cmd (string-downcase (car tokens)))\n                  (args (cdr tokens)))\n              (case (string-&gt;symbol cmd)\n                ((get)\n                 (if (= (length args) 1)\n                     (make-command 'get args)\n                     (make-command 'error '(&quot;GET requires exactly one argument&quot;))))\n                ((put set)\n                 (if (= (length args) 2)\n                     (make-command 'put args)\n                     (make-command 'error '(&quot;PUT requires exactly two arguments&quot;))))\n                ((delete del remove)\n                 (if (= (length args) 1)\n                     (make-command 'delete args)\n                     (make-command 'error '(&quot;DELETE requires exactly one argument&quot;))))\n                ((exists exist?)\n                 (if (= (length args) 1)\n                     (make-command 'exists args)\n                     (make-command 'error '(&quot;EXISTS requires exactly one argument&quot;))))\n                ((keys list)\n                 (make-command 'keys '()))\n                ((size count)\n                 (make-command 'size '()))\n                ((clear)\n                 (make-command 'clear '()))\n                ((stats statistics)\n                 (make-command 'stats '()))\n                ((save)\n                 (if (= (length args) 1)\n                     (make-command 'save args)\n                     (make-command 'error '(&quot;SAVE requires exactly one argument&quot;))))\n                ((load)\n                 (if (= (length args) 1)\n                     (make-command 'load args)\n                     (make-command 'error '(&quot;LOAD requires exactly one argument&quot;))))\n                ((begin transaction tx)\n                 (make-command 'begin-tx '()))\n                ((commit)\n                 (make-command 'commit '()))\n                ((rollback abort)\n                 (make-command 'rollback '()))\n                ((help)\n                 (make-command 'help '()))\n                ((quit exit)\n                 (make-command 'quit '()))\n                (else\n                 (make-command 'error (list (format &quot;Unknown command: ~a&quot; cmd))))))))))\n\n  ;; 执行命令\n  (define (execute-command store cmd current-tx)\n    (case (command-type cmd)\n      ((get)\n       (let ((key (car (command-args cmd))))\n         (let ((value (kv-get store key)))\n           (if value\n               (values (format &quot;~a&quot; value) current-tx)\n               (values &quot;Key not found&quot; current-tx)))))\n      \n      ((put)\n       (let ((key (car (command-args cmd)))\n             (value (cadr (command-args cmd))))\n         (kv-put! store key value)\n         (values &quot;OK&quot; current-tx)))\n      \n      ((delete)\n       (let ((key (car (command-args cmd))))\n         (kv-delete! store key)\n         (values &quot;OK&quot; current-tx)))\n      \n      ((exists)\n       (let ((key (car (command-args cmd))))\n         (values (if (kv-exists? store key) &quot;true&quot; &quot;false&quot;) current-tx)))\n      \n      ((keys)\n       (let ((keys (kv-keys store)))\n         (values (format &quot;~a&quot; keys) current-tx)))\n      \n      ((size)\n       (values (format &quot;~a&quot; (kv-size store)) current-tx))\n      \n      ((clear)\n       (kv-clear! store)\n       (values &quot;OK&quot; current-tx))\n      \n      ((stats)\n       (let ((stats (kv-stats store)))\n         (values (format &quot;~a&quot; stats) current-tx)))\n      \n      ((save)\n       (let ((filename (car (command-args cmd))))\n         (guard (ex (else (values (format &quot;Save error: ~a&quot; ex) current-tx)))\n           (kv-save! store filename)\n           (values &quot;Saved&quot; current-tx))))\n      \n      ((load)\n       (let ((filename (car (command-args cmd))))\n         (guard (ex (else (values (format &quot;Load error: ~a&quot; ex) current-tx)))\n           (kv-load! store filename)\n           (values &quot;Loaded&quot; current-tx))))\n      \n      ((begin-tx)\n       (if current-tx\n           (values &quot;Transaction already in progress&quot; current-tx)\n           (let ((tx-id (kv-transaction store)))\n             (values &quot;Transaction started&quot; tx-id))))\n      \n      ((commit)\n       (if current-tx\n           (begin\n             (kv-commit! store current-tx)\n             (values &quot;Transaction committed&quot; #f))\n           (values &quot;No transaction in progress&quot; current-tx)))\n      \n      ((rollback)\n       (if current-tx\n           (begin\n             (kv-rollback! store current-tx)\n             (values &quot;Transaction rolled back&quot; #f))\n           (values &quot;No transaction in progress&quot; current-tx)))\n      \n      ((help)\n       (values (string-append\n                &quot;Available commands:\\n&quot;\n                &quot;  GET &lt;key&gt;           - Get value for key\\n&quot;\n                &quot;  PUT &lt;key&gt; &lt;value&gt;   - Set key to value\\n&quot;\n                &quot;  DELETE &lt;key&gt;        - Delete key\\n&quot;\n                &quot;  EXISTS &lt;key&gt;        - Check if key exists\\n&quot;\n                &quot;  KEYS               - List all keys\\n&quot;\n                &quot;  SIZE               - Get number of keys\\n&quot;\n                &quot;  CLEAR              - Remove all keys\\n&quot;\n                &quot;  STATS              - Show statistics\\n&quot;\n                &quot;  SAVE &lt;file&gt;        - Save data to file\\n&quot;\n                &quot;  LOAD &lt;file&gt;        - Load data from file\\n&quot;\n                &quot;  BEGIN              - Start transaction\\n&quot;\n                &quot;  COMMIT             - Commit transaction\\n&quot;\n                &quot;  ROLLBACK           - Roll back transaction\\n&quot;\n                &quot;  HELP               - Show this help\\n&quot;\n                &quot;  QUIT               - Exit&quot;)\n               current-tx))\n      \n      ((quit)\n       (values 'quit current-tx))\n      \n      ((empty)\n       (values &quot;&quot; current-tx))\n      \n      ((error)\n       (values (format &quot;Error: ~a&quot; (command-args cmd)) current-tx))))</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_gidlf5uyc')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_gidlf5uyc')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">(library (kv-parser)\n  (export parse-command execute-command)\n  (import (rnrs)\n          (kv-store)\n          (chezscheme))\n\n  ;; 命令类型\n  (define-record-type command\n    (make-command type args)\n    command?\n    (type command-type)\n    (args command-args))\n\n  ;; 解析命令字符串\n  (define (parse-command input)\n    (guard (ex (else (make-command 'error (list &quot;Parse error&quot; ex))))\n      (let ((tokens (string-split input #\\space)))\n        (if (null? tokens)\n            (make-command 'empty '())\n            (let ((cmd (string-downcase (car tokens)))\n                  (args (cdr tokens)))\n              (case (string-&gt;symbol cmd)\n                ((get)\n                 (if (= (length args) 1)\n                     (make-command 'get args)\n                     (make-command 'error '(&quot;GET requires exactly one argument&quot;))))\n                ((put set)\n                 (if (= (length args) 2)\n                     (make-command 'put args)\n                     (make-command 'error '(&quot;PUT requires exactly two arguments&quot;))))\n                ((delete del remove)\n                 (if (= (length args) 1)\n                     (make-command 'delete args)\n                     (make-command 'error '(&quot;DELETE requires exactly one argument&quot;))))\n                ((exists exist?)\n                 (if (= (length args) 1)\n                     (make-command 'exists args)\n                     (make-command 'error '(&quot;EXISTS requires exactly one argument&quot;))))\n                ((keys list)\n                 (make-command 'keys '()))\n                ((size count)\n                 (make-command 'size '()))\n                ((clear)\n isplay prompt)\n      (flush-output-port (current-output-port))))\n\n  ;; 添加到历史记录\n  (define (add-to-history state command)\n    (let ((history (repl-state-history state)))\n      (set-repl-state-history! state \n                               (cons command (take history 99)))))  ; 保留100条历史\n\n  ;; 显示欢迎信息\n  (define (show-welcome)\n    (printf &quot;Welcome to KV-Store REPL!~n&quot;)\n    (printf &quot;Type 'help' for available commands, 'quit' to exit.~n~n&quot;))\n\n  ;; 启动 REPL\n  (define (start-repl . args)\n    (let* ((store (make-kv-store))\n           (state (make-repl-state store #f #t '())))\n      \n      ;; 如果提供了初始数据文件，加载它\n      (when (and (not (null? args)) (file-exists? (car args)))\n        (printf &quot;Loading data from ~a...~n&quot; (car args))\n        (kv-load! store (car args)))\n      \n      (show-welcome)\n      \n      ;; 主循环\n      (let repl-loop ()\n        (when (repl-state-running? state)\n          (guard (ex \n                   (else \n                     (printf &quot;Error: ~a~n&quot; ex)\n                     (repl-loop)))\n            \n            (show-prompt state)\n            \n            ;; 读取用户输入\n            (let ((input (get-line (current-input-port))))\n              (cond\n                ;; EOF (Ctrl-D)\n                ((eof-object? input)\n                 (printf &quot;~nGoodbye!~n&quot;))\n                \n                ;; 空行\n                ((string=? (string-trim input) &quot;&quot;)\n                 (repl-loop))\n                \n                ;; 正常命令\n                (else\n                 (add-to-history state input)\n                 (let ((cmd (parse-command input)))\n                   (let-values (((result new-tx) \n                                 (execute-command (repl-state-store state) \n                                                 cmd \n                                                 (repl-state-current-tx state))))\n                     (set-repl-state-current-tx! state new-tx)\n tore))\n           (state (make-repl-state store #f #t '())))\n      \n      ;; 如果提供了初始数据文件，加载它\n      (when (and (not (null? args)) (file-exists? (car args)))\n        (printf &quot;Loading data from ~a...~n&quot; (car args))\n        (kv-load! store (car args)))\n      \n      (show-welcome)\n      \n      ;; 主循环\n      (let repl-loop ()\n        (when (repl-state-running? state)\n          (guard (ex \n                   (else \n                     (printf &quot;Error: ~a~n&quot; ex)\n                     (repl-loop)))\n            \n            (show-prompt state)\n            \n            ;; 读取用户输入\n            (let ((input (get-line (current-input-port))))\n              (cond\n                ;; EOF (Ctrl-D)\n                ((eof-object? input)\n                 (printf &quot;~nGoodbye!~n&quot;))\n                \n                ;; 空行\n                ((string=? (string-trim input) &quot;&quot;)\n                 (repl-loop))\n                \n                ;; 正常命令\n                (else\n                 (add-to-history state input)\n                 (let ((cmd (parse-command input)))\n                   (let-values (((result new-tx) \n                                 (execute-command (repl-state-store state) \n                                                 cmd \n                                                 (repl-state-current-tx state))))\n                     (set-repl-state-current-tx! state new-tx)\n                     \n                     (cond\n                       ((eq? result 'quit)\n                        (set-repl-state-running?! state #f)\n                        (printf &quot;Goodbye!~n&quot;))\n                       (else\n                        (printf &quot;~a~n&quot; result)\n                        (repl-loop)))))))))))\n      \n      ;; 清理\n      (when (repl-state-current-tx state)\n        (kv-rollback! (repl-state-store state) (repl-state-current-tx state)))\n      \n      state))</textarea><div class=\"code-output\" in.ss</code>：</p><div class=\"code-block\" id=\"code_u2ox2n4yh\"><pre class=\"code-display\"><code class=\"language-scheme\">#!/usr/bin/env scheme --script\n\n;; 主程序 - KV Store 应用\n(import (rnrs)\n        (kv-store)\n        (kv-repl)\n        (kv-server) \n        (kv-monitor)\n        (chezscheme))\n\n;; 解析命令行参数\n(define (parse-args args)\n  (let ((mode 'repl)\n        (port 8080)\n        (data-file #f)\n        (monitor-interval 5))\n    (let loop ((args args))\n      (unless (null? args)\n        (let ((arg (car args))\n              (rest (cdr args)))\n          (cond\n            ((string=? arg &quot;--server&quot;)\n             (set! mode 'server))\n            ((string=? arg &quot;--port&quot;)\n             (unless (null? rest)\n               (set! port (string-&gt;number (car rest)))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--data&quot;)\n             (unless (null? rest)\n               (set! data-file (car rest))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--monitor&quot;)\n             (unless (null? rest)\n               (set! monitor-interval (string-&gt;number (car rest)))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--help&quot;)\n             (show-help)\n             (exit))\n            (else\n             (set! data-file arg)))\n          (loop rest))))\n    (values mode port data-file monitor-interval)))\n\n;; 显示帮助信息\n(define (show-help)\n  (printf &quot;KV-Store - A simple key-value database~n&quot;)\n  (printf &quot;Usage: main.ss [OPTIONS] [data-file]~n~n&quot;)\n  (printf &quot;Options:~n&quot;)\n  (printf &quot;  --server          Run as network server~n&quot;)\n  (printf &quot;  --port PORT       Server port (default: 8080)~n&quot;) \n  (printf &quot;  --data FILE       Data file to load/save~n&quot;)\n  (printf &quot;  --monitor SECS    Enable monitoring (interval in seconds)~n&quot;)\n  (printf &quot;  --help           Show this help~n~n&quot;)\n  (printf &quot;Examples:~n&quot;)\n  (printf &quot;  main.ss                    # Start REPL~n&quot;)\n  (printf &quot;  main.ss mydata.db         # Start REPL with data file~n&quot;)\n  (printf &quot;  main.ss --server          # Start server mode~n&quot;)\n  (printf &quot;  main.ss --server --port 9000 --data mydata.db~n&quot;))\n\n;; 信号处理\n(define (setup-signal-handlers store data-file)\n  (when data-file\n    ;; 在退出时自动保存数据\n    (call-with-current-continuation\n      (lambda (exit)\n        (with-exception-handler\n          (lambda (condition)\n            (printf &quot;~nSaving data before exit...~n&quot;)\n            (kv-save! store data-file)\n            (printf &quot;Data saved to ~a~n&quot; data-file)\n            (exit))\n          (lambda () #f))))))\n\n;; 主函数\n(define (main)\n  (let-values (((mode port data-file monitor-interval) \n                (parse-args (command-line-arguments))))\n    \n    ;; 创建存储实例\n    (let ((store (make-kv-store)))\n      \n      ;; 加载初始数据\n      (when (and data-file (file-exists? data-file))\n        (printf &quot;Loading data from ~a...~n&quot; data-file)\n        (kv-load! store data-file)\n        (printf &quot;Loaded ~a keys~n&quot; (kv-size store)))\n      \n      ;; 设置信号处理\n      (setup-signal-handlers store data-file)\n      \n      ;; 启动监控（如果需要）\n      (when (&gt; monitor-interval 0)\n        (printf &quot;Starting performance monitoring (interval: ~as)~n&quot; monitor-interval)\n        (start-monitoring store monitor-interval))\n      \n      ;; 根据模式启动相应服务\n      (case mode\n        ((repl)\n         (start-repl data-file))\n        \n        ((server)\n         (printf &quot;Starting server on port ~a~n&quot; port)\n         (start-server store port)\n         \n         ;; 等待用户输入来停止服务器\n         (printf &quot;Press Enter to stop server...~n&quot;)\n         (read-line)\n         (stop-server)\n         (printf &quot;Server stopped~n&quot;)))\n      \n      ;; 保存数据（如果指定了文件）\n      (when data-file\n        (printf &quot;Saving data to ~a...~n&quot; data-file)\n        (kv-save! store data-file)\n        (printf &quot;Data saved~n&quot;))\n      \n      ;; 停止监控\n      (stop-monitoring)\n      \n      ;; 显示最终统计\n      (let ((stats (kv-stats store)))\n        (printf &quot;~nFinal statistics:~n&quot;)\n        (for-each (lambda (stat)\n                    (printf &quot;  ~a: ~a~n&quot; (car stat) (cdr stat)))\n                  stats)))))\n\n;; 如果直接运行此文件则启动主函数\n(main)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_u2ox2n4yh')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_u2ox2n4yh')\">▶ 运行</button></div><textarea class=\"code-editor\" style=\"display:none\">#!/usr/bin/env scheme --script\n\n;; 主程序 - KV Store 应用\n(import (rnrs)\n        (kv-store)\n        (kv-repl)\n        (kv-server) \n        (kv-monitor)\n        (chezscheme))\n\n;; 解析命令行参数\n(define (parse-args args)\n  (let ((mode 'repl)\n        (port 8080)\n        (data-file #f)\n        (monitor-interval 5))\n    (let loop ((args args))\n      (unless (null? args)\n        (let ((arg (car args))\n              (rest (cdr args)))\n          (cond\n            ((string=? arg &quot;--server&quot;)\n             (set! mode 'server))\n            ((string=? arg &quot;--port&quot;)\n             (unless (null? rest)\n               (set! port (string-&gt;number (car rest)))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--data&quot;)\n             (unless (null? rest)\n               (set! data-file (car rest))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--monitor&quot;)\n             (unless (null? rest)\n               (set! monitor-interval (string-&gt;number (car rest)))\n               (set! rest (cdr rest))))\n            ((string=? arg &quot;--help&quot;)\n             (show-help)\n             (exit))\n            (else\n             (set! data-file arg)))\n          (loop rest))))\n rformance monitoring (interval: ~as)~n&quot; monitor-interval)\n        (start-monitoring store monitor-interval))\n      \n      ;; 根据模式启动相应服务\n      (case mode\n        ((repl)\n         (start-repl data-file))\n        \n        ((server)\n         (printf &quot;Starting server on port ~a~n&quot; port)\n         (start-server store port)\n         \n         ;; 等待用户输入来停止服务器\n         (printf &quot;Press Enter to stop server...~n&quot;)\n         (read-line)\n         (stop-server)\n         (printf &quot;Server stopped~n&quot;)))\n      \n      ;; 保存数据（如果指定了文件）\n      (when data-file\n        (printf &quot;Saving data to ~a...~n&quot; data-file)\n        (kv-save! store data-file)\n        (printf &quot;Data saved~n&quot;))\n      \n      ;; 停止监控\n      (stop-monitoring)\n      \n      ;; 显示最终统计\n      (let ((stats (kv-stats store)))\n        (printf &quot;~nFinal statistics:~n&quot;)\n        (for-each (lambda (stat)\n                    (printf &quot;  ~a: ~a~n&quot; (car stat) (cdr stat)))\n                  stats)))))\n\n;; 如果直接运行此文件则启动主函数\n(main)</textarea><div class=\"code-output\" style=\"display:none\"></div></div><h2>第七步：测试套件</h2><p>创建 <code>test-kv.ss</code>：</p><div class=\"code-block\" id=\"code_kjcg7hwbg\"><pre class=\"code-display\"><code class=\"language-scheme\">#!/usr/bin/env scheme --script\n\n(import (rnrs)\n        (kv-store)\n        (kv-parser)\n        (chezscheme))\n\n;; 简单测试框架\n(define *tests-passed* 0)\n(define *tests-failed* 0)\n\n(define (test-equal name expected actual)\n  (if (equal? expected actual)\n      (begin\n        (printf &quot;✓ ~a~n&quot; name)\n        (set! *tests-passed* (+ *tests-passed* 1)))\n      (begin\n        (printf &quot;✗ ~a - Expected: ~a, Got: ~a~n&quot; name expected actual)\n        (set! *tests-failed* (+ *tests-failed* 1)))))\n\n(define (test-true name condition)\n  (test-equal name #t condition))\n\n(define (test-false name condition)\n  (test-equal name #f condition))\n\n;; 基本功能测试\n(define (test-basic-operations)\n  (printf &quot;Testing basic operations...~n&quot;)\n  (let ((store (make-kv-store)))\n    \n    ;; 测试 PUT 和 GET\n    (kv-put! store &quot;key1&quot; &quot;value1&quot;)\n    (test-equal &quot;PUT/GET&quot; &quot;value1&quot; (kv-get store &quot;key1&quot;))\n    \n    ;; 测试不存在的键\n    (test-equal &quot;GET non-existent&quot; #f (kv-get store &quot;nonexistent&quot;))\n    \n    ;; 测试 EXISTS\n    (test-true &quot;EXISTS existing key&quot; (kv-exists? store &quot;key1&quot;))\n    (test-false &quot;EXISTS non-existent key&quot; (kv-exists? store &quot;nonexistent&quot;))\n    \n    ;; 测试 DELETE\n    (kv-delete! store &quot;key1&quot;)\n    (test-false &quot;DELETE&quot; (kv-exists? store &quot;key1&quot;))\n    \n    ;; 测试 SIZE\n    (test-equal &quot;Initial size&quot; 0 (kv-size store))\n    (kv-put! store &quot;a&quot; &quot;1&quot;)\n    (kv-put! store &quot;b&quot; &quot;2&quot;)\n    (test-equal &quot;Size after inserts&quot; 2 (kv-size store))\n    \n    ;; 测试 CLEAR\n    (kv-clear! store)\n    (test-equal &quot;Size after clear&quot; 0 (kv-size store))))\n\n;; 持久化测试\n(define (test-persistence)\n  (printf &quot;Testing persistence...~n&quot;)\n  (let ((store1 (make-kv-store))\n        (store2 (make-kv-store))\n        (test-file &quot;test-data.db&quot;))\n    \n    ;; 在第一个存储中添加数据\n    (kv-put! store1 &quot;name&quot; &quot;Alice&quot;)\n    (kv-put! store1 &quot;age&quot; &quot;30&quot;)\n    (kv-put! store1 &quot;city&quot; &quot;Beijing&quot;)\n    \n    ;; 保存到文件\n    (kv-save! store1 test-file)\n    \n    ;; 从文件加载到第二个存储\n    (kv-load! store2 test-file)\n    \n    ;; 验证数据\n    (test-equal &quot;Persistence - name&quot; &quot;Alice&quot; (kv-get store2 &quot;name&quot;))\n    (test-equal &quot;Persistence - age&quot; &quot;30&quot; (kv-get store2 &quot;age&quot;))\n    (test-equal &quot;Persistence - city&quot; &quot;Beijing&quot; (kv-get store2 &quot;city&quot;))\n    (test-equal &quot;Persistence - size&quot; 3 (kv-size store2))\n    \n    ;; 清理测试文件\n    (delete-file test-file)))\n\n;; 事务测试\n(define (test-transactions)\n  (printf &quot;Testing transactions...~n&quot;)\n  (let ((store (make-kv-store)))\n    \n    ;; 添加初始数据\n    (kv-put! store &quot;balance&quot; &quot;1000&quot;)\n    \n    ;; 开始事务\n    (let ((tx1 (kv-transaction store)))\n      \n      ;; 在事务中修改数据\n      (kv-put! store &quot;balance&quot; &quot;500&quot;)\n      (test-equal &quot;Transaction - modified value&quot; &quot;500&quot; (kv-get store &quot;balance&quot;))\n      \n      ;; 回滚事务\n      (kv-rollback! store tx1)\n      (test-equal &quot;Transaction - after rollback&quot; &quot;1000&quot; (kv-get store &quot;balance&quot;)))\n    \n    ;; 测试提交\n    (let ((tx2 (kv-transaction store)))\n      (kv-put! store &quot;balance&quot; &quot;800&quot;)\n      (kv-commit! store tx2)\n      (test-equal &quot;Transaction - after commit&quot; &quot;800&quot; (kv-get store &quot;balance&quot;)))))\n\n;; 命令解析测试\n(define (test-command-parsing)\n  (printf &quot;Testing command parsing...~n&quot;)\n  \n  ;; 测试 GET 命令\n  (let ((cmd (parse-command &quot;GET mykey&quot;)))\n    (test-equal &quot;Parse GET command&quot; 'get (command-type cmd))\n    (test-equal &quot;Parse GET args&quot; '(&quot;mykey&quot;) (command-args cmd)))\n  \n  ;; 测试 PUT 命令\n  (let ((cmd (parse-command &quot;PUT key value&quot;)))\n    (test-equal &quot;Parse PUT command&quot; 'put (command-type cmd))\n    (test-equal &quot;Parse PUT args&quot; '(&quot;key&quot; &quot;value&quot;) (command-args cmd)))\n  \n  ;; 测试无效命令\n  (let ((cmd (parse-command &quot;INVALID&quot;)))\n    (test-equal &quot;Parse invalid command&quot; 'error (command-type cmd)))\n  \n  ;; 测试参数错误\n  (let ((cmd (parse-command &quot;GET&quot;)))\n    (test-equal &quot;Parse GET without args&quot; 'error (command-type cmd))))\n\n;; 性能测试\n(define (test-performance)\n  (printf &quot;Testing performance...~n&quot;)\n  (let ((store (make-kv-store)))\n    \n    ;; 大量插入测试\n    (printf &quot;  Inserting 10000 keys...~n&quot;)\n    (let ((start-time (current-time 'time-process)))\n      (let loop ((i 0))\n        (when (&lt; i 10000)\n          (kv-put! store (format &quot;key~a&quot; i) (format &quot;value~a&quot; i))\n          (loop (+ i 1))))\n      (let ((end-time (current-time 'time-process)))\n        (printf &quot;  Insert time: ~a seconds~n&quot; (- end-time start-time))))\n    \n    ;; 随机查找测试\n    (printf &quot;  Random lookups...~n&quot;)\n    (let ((start-time (current-time 'time-process)))\n      (let loop ((i 0))\n        (when (&lt; i 1000)\n          (kv-get store (format &quot;key~a&quot; (random 10000)))\n          (loop (+ i 1))))\n      (let ((end-time (current-time 'time-process)))\n        (printf &quot;  Lookup time: ~a seconds~n&quot; (- end-time start-time))))\n    \n    ;; 验证统计信息\n    (let ((stats (kv-stats store)))\n      (test-equal &quot;Performance - final size&quot; 10000 (cdr (assoc 'size stats)))\n      (test-true &quot;Performance - gets &gt; 0&quot; (&gt; (cdr (assoc 'gets stats)) 0)))))\n\n;; 运行所有测试\n(define (run-all-tests)\n  (printf &quot;Starting KV-Store tests...~n~n&quot;)\n  \n  (test-basic-operations)\n  (printf &quot;~n&quot;)\n  \n  (test-persistence)\n  (printf &quot;~n&quot;)\n  \n  (test-transactions)\n  (printf &quot;~n&quot;)\n  \n  (test-command-parsing)\n  (printf &quot;~n&quot;)\n  \n  (test-performance)\n  (printf &quot;~n&quot;)\n  \n  (printf &quot;Test Results:~n&quot;)\n  (printf &quot;  Passed: ~a~n&quot; *tests-passed*)\n  (printf &quot;  Failed: ~a~n&quot; *tests-failed*)\n  (printf &quot;  Total:  ~a~n&quot; (+ *tests-passed* *tests-failed*))\n  \n  (if (&gt; *tests-failed* 0)\n      (begin\n        (printf &quot;~nSome tests failed!~n&quot;)\n        (exit 1))\n      (printf &quot;~nAll tests passed!~n&quot;)))\n\n;; 运行测试\n(run-all-tests)</code></pre><div class=\"code-actions\"><button class=\"btn-edit\" onclick=\"toggleEdit('code_kjcg7hwbg')\">✏️ 编辑</button><button class=\"btn-run\" onclick=\"runCode('code_kjcg7hwbg')\">▶ 运行
